name: 🚀 iOS Enterprise Multinacional Build & Submit (Auto-Corretivo)

on:
  push:
    branches:
      - main
      - 'release/*'
  workflow_dispatch:
    inputs:
      RELEASE_APPROVED:
        description: 'Aprovação manual para submissão (true/false)'
        required: false
        default: 'false'

jobs:
  ios-pipeline:
    name: 🍏 iOS Local Build (GitHub Runner - No Expo Credits)
    runs-on: macos-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
    
    # Proteção de Ambiente para Aprovação Manual (Opcional se configurado no GitHub)
    # environment: production

    env:
      APP_NAME: "Açucaradas Encomendas"
      PLATFORM: "ios"
      PROFILE: "production_v13"
      # Governança de Release
      RELEASE_APPROVED: ${{ github.event.inputs.RELEASE_APPROVED || 'false' }}
      # Secrets Obrigatórios
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      # Firebase (Injetados via Workflow)
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      # 🚨 Variáveis de Runtime (Necessárias para Local Build V3.2)
      # No EAS Cloud elas vinham do Expo Dashboard, no Local Build precisam vir do GitHub Secrets.
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      EXPO_PUBLIC_APP_NAME: "Açucaradas Encomendas"
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_PROD: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_PROD }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para tagging automática

      # 🔹 Fix Permissions for Scripts
      - name: 🔑 Fix Script Permissions
        run: chmod +x scripts/ci/*.sh

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: ⚙️ Install EAS CLI (Versão Mais Recente)
        run: npm install -g eas-cli@latest

      - name: 🏷️ [ETAPA 0] Version Bump & Auto-Versioning
        run: |
          chmod +x scripts/ci/*.sh
          ./scripts/ci/version-bump.sh

      - name: 🏢 [SaaS] Ativar Contexto Multi-tenant (GrowthOS)
        run: |
          chmod +x saas/saas-context.sh
          source saas/saas-context.sh
          echo "GROWTHOS_TENANT_ID=${GROWTHOS_TENANT_ID:-acucaradas}" >> $GITHUB_ENV

      - name: 🍏 [ETAPA 2] Build iOS (iOS-BUILD-GUARDIAN)
        id: build_ios
        # Removido env redundante que sobrescreve o exportado pelo guardian
        run: |
          chmod +x scripts/ci/ios-build-guardian.sh
          ./scripts/ci/ios-build-guardian.sh

      - name: 🧨 [ETAPA 3] Auto-Heal (Se necessário)
        if: steps.build_ios.outcome == 'failure'
        id: auto_heal
        continue-on-error: true
        run: |
          # Detectar código de erro no log para passar para o auto-heal
          if grep -q "Apple 401" build_log.txt; then ERROR_CODE=10;
          elif grep -q "Apple 403" build_log.txt; then ERROR_CODE=20;
          elif grep -q "No certificate exists" build_log.txt; then ERROR_CODE=30;
          elif grep -q "Provisioning profile" build_log.txt; then ERROR_CODE=40;
          else ERROR_CODE=99; fi
          
          ./scripts/ci/auto-heal-ios.sh $ERROR_CODE

      - name: 📜 [GOVERNANÇA] Registrar Histórico de Build
        if: always()
        run: |
          BUILD_STATUS="failure"
          AUTO_HEAL_USED="false"
          if [ "${{ steps.build_ios.outcome }}" == "success" ] || [ "${{ steps.auto_heal.outcome }}" == "success" ]; then
            BUILD_STATUS="success"
          fi
          if [ "${{ steps.auto_heal.outcome }}" == "success" ] || [ "${{ steps.auto_heal.outcome }}" == "failure" ]; then
            AUTO_HEAL_USED="true"
          fi
          ./scripts/ci/release-history.sh $BUILD_STATUS $AUTO_HEAL_USED

      - name: 🧠 [IA-DRIVEN] Motor de Decisão de Release
        if: (steps.build_ios.outcome == 'success' || steps.auto_heal.outcome == 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ./scripts/ci/pipeline-status.sh
          ./scripts/ci/release-decision.sh
          chmod +x scripts/ci/notify-decision.sh
          ./scripts/ci/notify-decision.sh

      - name: 📤 [ETAPA 4] Submit TestFlight (Auto-Release ou Aprovado)
        if: (steps.build_ios.outcome == 'success' || steps.auto_heal.outcome == 'success') && (env.RELEASE_DECISION == 'AUTO-RELEASE' || (env.RELEASE_DECISION == 'REQUIRE_APPROVAL' && env.RELEASE_APPROVED == 'true'))
        id: submit_step
        run: |
          echo "[INFO] [IA-DECISION] Iniciando submissão: ${{ env.RELEASE_DECISION }}"
          echo "[INFO] Motivo: ${{ env.RELEASE_REASON }}"
          ./scripts/ci/submit-monitor.sh

      - name: 🚫 [GOVERNANÇA] Skip Submit (Aprovação Pendente ou Bloqueado)
        if: (steps.build_ios.outcome == 'success' || steps.auto_heal.outcome == 'success') && (env.RELEASE_DECISION == 'BLOCK_RELEASE' || (env.RELEASE_DECISION == 'REQUIRE_APPROVAL' && env.RELEASE_APPROVED != 'true'))
        run: |
          echo "[WARNING] [IA-DECISION] Submissão suspensa: ${{ env.RELEASE_DECISION }}"
          echo "[WARNING] Motivo: ${{ env.RELEASE_REASON }}"
          echo "[WARNING] Nível de Risco: ${{ env.RELEASE_RISK }}"
          
          if [ "${{ env.RELEASE_DECISION }}" == "BLOCK_RELEASE" ]; then
             echo "🚨 Release bloqueado por instabilidade — revisar pipeline"
          else
             echo "👉 Defina RELEASE_APPROVED=true no workflow_dispatch para submeter ao TestFlight."
          fi

      - name: 🏷️ [ETAPA 5] Git Tagging Automático
        if: steps.build_ios.outcome == 'success' || steps.auto_heal.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ env.VERSION }}-build-${{ env.BUILD_NUMBER }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Renomear IPA para facilitar download
          cp *.ipa Acucaradas_Encomendas.ipa || true
          
          # Verificar se a tag já existe para evitar erro
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG_NAME já existe. Pulando criação."
          else
            git tag -a "$TAG_NAME" -m "Automated release tag for version $TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: 🕵️ [SELF-ROLLBACK] Monitoramento Pós-Release
        if: always() && (steps.submit_step.outcome == 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Simular taxa de crash real via ENV (opcional no workflow_dispatch)
          export REAL_CRASH_RATE=${{ github.event.inputs.REAL_CRASH_RATE || '0.1' }}
          export REAL_CRITICAL_ERRORS=${{ github.event.inputs.REAL_CRITICAL_ERRORS || '0' }}
          
          chmod +x scripts/ci/post-release-monitor.sh
          ./scripts/ci/post-release-monitor.sh
          
          if [ "$POST_RELEASE_ACTION" == "ROLLBACK" ]; then
             echo "🚨 [SELF-ROLLBACK] Iniciando notificação de crise"
             # Aqui poderíamos disparar o notify-decision.sh adaptado ou alerta crítico
          fi

      - name: 📈 [BUSINESS-MONITOR] Growth & Product AI
        if: always() && (steps.submit_step.outcome == 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Simular métricas de negócio (Firebase Analytics Mock)
          export REAL_CONVERSION=${{ github.event.inputs.REAL_CONVERSION || '4.5' }}
          export REAL_ABANDONMENT=${{ github.event.inputs.REAL_ABANDONMENT || '22.0' }}
          
          chmod +x scripts/ci/business-monitor.sh
          ./scripts/ci/business-monitor.sh
          
          if [ "$BUSINESS_STATE" != "HEALTHY" ]; then
             chmod +x scripts/ci/notify-business.sh
             ./scripts/ci/notify-business.sh
          fi

      - name: 🧪 [AUTO-GROWTH] Experiment Engine & Optimization
        if: always() && (steps.submit_step.outcome == 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Rodar motor de experimentação
          chmod +x scripts/ci/experiment-engine.sh
          ./scripts/ci/experiment-engine.sh
          
          # Rodar motor de decisão de growth (Simular resultado)
          export REAL_TEST_CONV=${{ github.event.inputs.REAL_TEST_CONV || '4.9' }}
          chmod +x scripts/ci/growth-decision.sh
          ./scripts/ci/growth-decision.sh
          
          # Notificar ganho se houve promoção de variante
          if [ "$GROWTH_DECISION" == "PROMOTE_B" ]; then
             chmod +x scripts/ci/notify-growth.sh
             ./scripts/ci/notify-growth.sh
          fi

      - name: 🌍 [MARKET-INTELLIGENCE] Demand & Strategic Scaling
        if: always() && (steps.submit_step.outcome == 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Rodar inteligência de demanda e ranking
          chmod +x scripts/ci/demand-intelligence.sh
          ./scripts/ci/demand-intelligence.sh
          
          # Rodar motor de precificação dinâmica
          chmod +x scripts/ci/pricing-engine.sh
          ./scripts/ci/pricing-engine.sh
          
          # Rodar previsão de demanda (IA)
          chmod +x scripts/ci/demand-forecast.sh
          ./scripts/ci/demand-forecast.sh
          
          # Rodar decisão estratégica de mercado
          chmod +x scripts/ci/market-decision.sh
          ./scripts/ci/market-decision.sh
          
          # Notificar decisão estratégica
          chmod +x scripts/ci/notify-market.sh
          ./scripts/ci/notify-market.sh

      - name: 📁 Upload Artefatos (IPA & Logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts-${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            *.ipa
            build_log.txt
            submit_log.txt
            error_summary.txt
            pipeline_status.json
            release-history.json
            release-decision.json
            incident-history.json
            business-history.json
            growth-history.json
            market-history.json
          if-no-files-found: warn
          retention-days: 7

      - name: 📊 [ETAPA 6] Health Check & Alertas
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ./scripts/ci/pipeline-status.sh
          
          if [ "${{ job.status }}" == "failure" ]; then
            ./scripts/ci/notify-failure.sh
          fi

      - name: 🛡️ [ETAPA 7] Proteção contra Falhas Consecutivas
        if: failure()
        run: |
          if [ "${{ steps.auto_heal.outcome }}" == "failure" ]; then
             echo "[CRITICAL] Auto-heal falhou após tentativa de recuperação."
             echo "🚨 Pipeline pausado por falhas críticas — ação manual necessária"
          fi
