name: 🚀 Build & Submit Mobile (EAS SUBMIT)
# Force trigger for real mission v2.1
concurrency:
  group: ios-release-lock
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_approved:
        description: 'Aprovar build de produção?'
        required: true
        default: 'true'
        type: boolean
      build_mode:
        description: 'Modo de Build'
        required: true
        default: 'LOCAL'
        type: choice
        options:
          - LOCAL
          - CLOUD

jobs:
  ios-hybrid-pipeline:
    name: Hybrid Pipeline
    runs-on: macos-15
    timeout-minutes: 60
    
    env:
      RELEASE_APPROVED: ${{ github.event.inputs.release_approved == 'true' || contains(github.event.head_commit.message, '[release]') || github.event_name == 'workflow_dispatch' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_MONITORING_REMOTE_ENABLED: ${{ secrets.EXPO_PUBLIC_MONITORING_REMOTE_ENABLED }}
      PROFILE: "production_v13"
      FORCE_BUILD_MODE: ${{ github.event.inputs.build_mode || 'LOCAL' }}

    steps:
      - name: 🧹 Clean Previous Zombie Processes
        run: |
          echo "🧹 [CLEAN] Killing previous zombie build processes..."
          killall xcodebuild || true
          killall SWBBuildService || true
          killall node || true
          killall tail || true

      - name: 🔍 Debug Context & Environment
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Release Approved: $RELEASE_APPROVED"
          echo "Xcode version:"
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "Commit Message: ${{ github.event.head_commit.message }}"
          fi

      - name: 🛡️ Validate Release Approval
        run: |
          echo "🔍 Checking release approval..."
          if [ "${RELEASE_APPROVED}" != "true" ]; then
            echo "❌ Production build blocked: RELEASE_APPROVED=false"
            echo "💡 Dica: Adicione '[release]' na mensagem do commit ou use o disparo manual com aprovação."
            exit 1
          else
            echo "✅ Production build approved via commit tag or manual trigger"
          fi

      - name: 🏗️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Diagnose macOS/Xcode
        run: |
          echo "=== System Info ==="
          sw_vers
          echo "=== Available Xcode Versions ==="
          ls /Applications | grep Xcode || true
          echo "=== Current Xcode Selection ==="
          xcode-select -p
          echo "=== Current Xcode Version ==="
          xcodebuild -version
          echo "=== Available SDKs ==="
          xcodebuild -showsdks

      - name: 🛠️ Setup Stable Xcode (16.1+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🛠️ Hardening macOS Runner Environment
        run: |
          # 1. Fix Xcode path is already handled by setup-xcode action
          
          echo "=== Final Xcode Selection ==="
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

          # 2. Fix Ruby/CocoaPods environment (LibYAML issue)
          # Silencing brew warnings
          brew install libyaml || brew link --overwrite libyaml
          
          # 3. Fix npm/node-gyp issues
          npm install -g node-gyp
          
          # 4. Global EAS CLI (Ensuring fresh version)
          npm install -g eas-cli@latest
          
          # 5. Fastlane and CocoaPods
          brew install cocoapods || true
          gem install fastlane cocoapods -NV || true
          
          # 6. Set CI environment variables
          echo "CI=true" >> $GITHUB_ENV
          echo "TERM=dumb" >> $GITHUB_ENV

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🛡️ Build Number Enforcer (Source of Truth)
        run: |
          echo "🔄 [ENFORCE] Sincronizando Build Number (V7.0)..."
          node scripts/ci/force-build-number.js --run
          
          # Exportar variáveis para o ambiente do runner
          BUILD_NUMBER=$(jq -r '.expo.ios.buildNumber' app.json)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "CURRENT_BN=$BUILD_NUMBER" >> $GITHUB_ENV
          
      - name: 🎨 Verify Assets Integrity
        run: |
          echo "🔍 [ASSETS] Verificando integridade das imagens..."
          if [ ! -f "assets/app-icon.png" ]; then
            echo "❌ [FATAL] assets/app-icon.png não encontrado!"
            exit 1
          fi
          if [ ! -f "assets/splash.png" ]; then
            echo "❌ [FATAL] assets/splash.png não encontrado!"
            exit 1
          fi
          echo "✅ [OK] Assets detectados com sucesso."

      - name: 📁 Restore Firebase iOS Config (GoogleService-Info.plist)
        run: |
          echo "📂 [FIREBASE] Restaurando GoogleService-Info.plist..."
          if [ -n "${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}" ]; then
            echo "📦 [BASE64] Decodificando via GOOGLE_SERVICES_INFO_PLIST_BASE64..."
            echo "${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}" | base64 --decode > GoogleService-Info.plist
          elif [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo "📝 [XML] Gravando via GOOGLE_SERVICE_INFO_PLIST..."
            printf "%s" "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > GoogleService-Info.plist
          else
            echo "⚠️ [WARN] Nenhuma Secret de Firebase encontrada. Verificando se arquivo já existe..."
          fi
          
          if [ -f "GoogleService-Info.plist" ]; then
            echo "✅ [OK] GoogleService-Info.plist pronto."
            ls -lah GoogleService-Info.plist
          else
            echo "❌ [FATAL] GoogleService-Info.plist ausente. O build iOS irá falhar."
            exit 1
          fi

      - name: 🛡️ iOS-BUILD-GUARDIAN (Local Mode)
        run: |
          chmod +x ./scripts/ci/ios-build-guardian.sh
          EXPO_DEBUG=1 ./scripts/ci/ios-build-guardian.sh
        env:
          FORCE_BUILD_MODE: "LOCAL"
          DEBUG: "eas:*"

      - name: 📦 Upload iOS Artifact (.ipa)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: |
            dist/app.ipa
            build-logs/ios-build-log.json
          if-no-files-found: warn
          retention-days: 7

      - name: 🛡️ Post-Release Health Check (Release Guardian)
        if: success()
        run: node scripts/post-release-monitor.js
