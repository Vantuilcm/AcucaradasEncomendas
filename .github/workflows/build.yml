name: RellBuild - Automated CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build & Deploy
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write # Obrigatório para autenticação via OIDC (WIF)
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Firebase secrets (Base64) - Mantemos apenas o que for estritamente necessário para prebuild local
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      # Removido GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 (Migrado para WIF)
      # Firebase Env Vars
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Authenticate to Google Cloud (OIDC/WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Estes valores são configurados no Google Cloud Console via setup-wif.sh
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: ⚙️ Setup GCloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🛡️ Security Scan
        run: |
          chmod +x scripts/security-scan.sh
          ./scripts/security-scan.sh

      - name: 🔑 Inject Secrets
        run: |
          if [ ! -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo $GOOGLE_SERVICES_JSON_BASE64 | base64 --decode > google-services.json
          fi
          if [ ! -z "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo $GOOGLE_SERVICE_INFO_PLIST_BASE64 | base64 --decode > GoogleService-Info.plist
          fi
          if [ ! -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" ]; then
            echo $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 | base64 --decode > google-service-account.json
          fi

      - name: 🔍 Validate Environment
        run: node scripts/validate-env.js

      - name: 🆙 Bump Version (Semantic Patch)
        run: node scripts/bump-version.js

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🩺 Expo Doctor
        run: npx expo doctor

      - name: 🛠 Determine Profile
        id: profile
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=preview" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Build Android
        run: |
          # Usamos --local para evitar custos do EAS Cloud, mantendo o processo gratuito no runner macOS do GitHub
          npx eas build --platform android --profile ${{ steps.profile.outputs.name }} --local --non-interactive --output=app-release.aab

      - name: 🍏 Build iOS
        run: |
          # Build iOS local no runner macOS (Grátis)
          npx eas build --platform ios --profile ${{ steps.profile.outputs.name }} --local --non-interactive --output=app-release.ipa

      - name: 🚀 Submit to Google Play
        if: success()
        run: |
          # O EAS detecta automaticamente as credenciais configuradas pelo setup-gcloud
          # através da variável GOOGLE_APPLICATION_CREDENTIALS exportada no passo anterior
          npx eas submit --platform android --profile ${{ steps.profile.outputs.name }} --path=app-release.aab --non-interactive

      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.profile.outputs.name }}-${{ github.run_number }}
          path: |
            app-release.aab
            app-release.ipa
            app.json

      - name: 📊 Final Report
        if: always()
        run: |
          echo "### 🚀 RellBuild CI/CD Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ steps.profile.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $(node -p "require('./app.json').expo.version")" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- **Artifacts:** Gerados com sucesso (aab/ipa)" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "- **Play Store:** Submetido para track PRODUCTION" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Play Store:** Submetido para track INTERNAL (Preview)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **Rollback:** Build/Deploy falhou. Versão anterior mantida." >> $GITHUB_STEP_SUMMARY
          fi