# Workflow for GitHub-hosted iOS builds (Ultra Safe Cleaned)
name: iOS Production Build (GitHub Free)

concurrency:
  group: ios-build-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
      - upgrade/sdk-52-rn-076
      - fix-build-sdk-52
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag)'
        required: true
        default: 'upgrade/sdk-52-rn-076'
        type: string
      profile:
        description: 'EAS Build Profile'
        required: true
        default: 'production_local'
        type: choice
        options:
          - production_local
          - preview
          - development
      mode:
        description: 'Modo de execucao'
        required: true
        default: 'github_macos'
        type: choice
        options:
          - audit_only
          - github_macos
      publish_update:
        description: 'Publicar EAS Update (OTA)'
        required: true
        default: false
        type: boolean
  repository_dispatch:
    types:
      - ios_build_free

env:
  # Using safe access to inputs
  INPUT_REF: ${{ inputs.ref || github.event.client_payload.ref || github.ref_name }}
  INPUT_PROFILE: ${{ inputs.profile || github.event.client_payload.profile || 'production_local' }}
  INPUT_MODE: ${{ inputs.mode || github.event.client_payload.mode || 'github_macos' }}
  INPUT_PUBLISH_UPDATE: ${{ inputs.publish_update || github.event.client_payload.publish_update || false }}

jobs:
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: 1
      SENTRY_ALLOW_FAILURE: 1
      EXPO_PUBLIC_ENABLE_SENTRY: 0
      NO_SENTRY_VALIDATE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Validate profile
        run: |
          if [ "${INPUT_PROFILE}" != "production_local" ]; then
            echo "Erro: Este workflow so permite production_local."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
        env:
          NODE_ENV: development
          NO_SENTRY_VALIDATE: 1

      - name: Prepare environment
        run: npm run prepare:ios
        env:
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

  build:
    name: Build iOS IPA
    runs-on: macos-15
    needs: preflight
    if: ${{ (inputs.mode || github.event.client_payload.mode || 'github_macos') == 'github_macos' && (inputs.profile || github.event.client_payload.profile || 'production_local') == 'production_local' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
        env:
          NODE_ENV: development

      - name: Prepare iOS Build
        run: npm run prepare:ios
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          APPLE_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          APPLE_PROVISION_BASE64: ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          ONESIGNAL_CERT_BASE64: ${{ secrets.ONESIGNAL_CERT_BASE64 }}
          ONESIGNAL_PROVISION_BASE64: ${{ secrets.ONESIGNAL_PROVISION_BASE64 }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install xcbeautify
        run: brew install xcbeautify || true

      - name: Build IPA
        run: |
          set -o pipefail
          # Validar se o P12 gerado é legível (sem mostrar a senha)
          if [ -f "credentials/ios/AcucaradasEncomendas-dist-cert.p12" ]; then
            echo "🔍 Verificando integridade do certificado P12..."
            if openssl pkcs12 -info -in credentials/ios/AcucaradasEncomendas-dist-cert.p12 -passin pass:"${APPLE_CERT_PASSWORD}" -nokeys -nodes > /dev/null 2>&1; then
              echo "✅ Certificado P12 e senha validados com sucesso."
            else
              echo "------------------------------------------------------"
              echo "❌ ERRO CRÍTICO: SENHA DO CERTIFICADO INVÁLIDA"
              echo "A senha configurada no segredo 'IOS_CERT_PASSWORD' não funciona para este certificado P12."
              echo "Verifique se você digitou a senha correta ao exportar o arquivo .p12."
              echo "------------------------------------------------------"
              exit 1
            fi
          fi
          
          eas build --platform ios --profile production_local --local --non-interactive --output="./Acucaradas.ipa"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          NODE_ENV: production
          NO_SENTRY_VALIDATE: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acucaradas-iOS-IPA
          path: Acucaradas.ipa
          if-no-files-found: error
          retention-days: 7
