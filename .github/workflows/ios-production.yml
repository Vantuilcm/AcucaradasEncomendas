name: Â­Æ’ĂœĂ‡ iOS PRODUCTION RELEASE

concurrency:
  group: ios-release-lock
  cancel-in-progress: true

on:
  push:
    branches:
      - prod-release-1170
  workflow_dispatch:
    inputs:
      release_approved:
        description: 'Aprovar build de produâ”œÂºâ”œĂºo?'
        required: true
        default: 'true'
        type: boolean
      build_mode:
        description: 'Modo de Build'
        required: true
        default: 'LOCAL'
        type: choice
        options:
          - LOCAL
          - CLOUD

jobs:
  ios-hybrid-pipeline:
    name: Hybrid Pipeline
    runs-on: macos-latest
    timeout-minutes: 90
    
    env:
      RELEASE_APPROVED: ${{ github.event.inputs.release_approved == 'true' || github.event_name == 'push' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_MONITORING_REMOTE_ENABLED: ${{ secrets.EXPO_PUBLIC_MONITORING_REMOTE_ENABLED }}
      PROFILE: "production"
      FORCE_BUILD_MODE: ${{ github.event.inputs.build_mode || 'LOCAL' }}
      FIXED_BUILD_NUMBER: 1170

    steps:
      - name: Â­Æ’Âºâ•£ Clean Previous Zombie Processes
        run: |
          echo "Â­Æ’Âºâ•£ [CLEAN] Killing previous zombie build processes..."
          killall xcodebuild || true
          killall SWBBuildService || true
          killall node || true
          killall tail || true

      - name: Â­Æ’Ă¶Ă¬ Debug Context & Environment
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Release Approved: $RELEASE_APPROVED"
          echo "Xcode version:"
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks

      - name: Â­Æ’Ă…Ă¹Â´Â©Ă… Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: prod-release-1170

      - name: Â­Æ’Æ’Ă³ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Â­Æ’Ă¸Ă­Â´Â©Ă… Hardening macOS Runner Environment
        run: |
          # 1. Fix Xcode path
          sudo xcode-select -s /Applications/Xcode.app
          
          # 2. Fix Ruby/CocoaPods environment (LibYAML issue)
          brew install libyaml || brew link --overwrite libyaml
          
          # 3. Fix npm/node-gyp issues
          npm install -g node-gyp
          
          # 4. Global EAS CLI
          npm install -g eas-cli@latest
          
          # 4.1 Global ts-node (Required for PipelineOrchestrator)
          npm install -g ts-node
          
          # 5. Set CI environment variables
          echo "CI=true" >> $GITHUB_ENV
          echo "TERM=dumb" >> $GITHUB_ENV

      - name: Â­Æ’Ă´Âª Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Â­Æ’Ă´Ă¬ Typecheck
        run: npm run type-check

      - name: Â­Æ’Ă¸Ă­Â´Â©Ă… Build Number Enforcer (Source of Truth)
        run: |
          echo "Â­Æ’Ă¶Ă¤ [ENFORCE] Sincronizando Build Number (V7.0)..."
          # Ensure build number is 1170
          node scripts/prepare-ios-build.js
          
          # Exportar variâ”œĂ­veis para o ambiente do runner
          BUILD_NUMBER=$(jq -r '.expo.ios.buildNumber' app.json)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "CURRENT_BN=$BUILD_NUMBER" >> $GITHUB_ENV
          
      - name: Â­Æ’Ă„Â¿ Verify Assets Integrity
        run: |
          echo "Â­Æ’Ă¶Ă¬ [ASSETS] Verificando integridade das imagens..."
          if [ ! -f "assets/app-icon.png" ]; then
            echo "Ă”Ă˜Ă® [FATAL] assets/app-icon.png nâ”œĂºo encontrado!"
            exit 1
          fi
          if [ ! -f "assets/splash.png" ]; then
            echo "Ă”Ă˜Ă® [FATAL] assets/splash.png nâ”œĂºo encontrado!"
            exit 1
          fi
          echo "Ă”Â£Ă  [OK] Assets detectados com sucesso."

      - name: Â­Æ’Ă¸Ă­Â´Â©Ă… iOS-BUILD-GUARDIAN (Local Mode)
        run: |
          chmod +x ./scripts/ci/ios-build-guardian.sh
          EXPO_DEBUG=1 ./scripts/ci/ios-build-guardian.sh
        env:
          FORCE_BUILD_MODE: "LOCAL"
          DEBUG: "eas:*"
          PROFILE: "production"

      - name: Â­Æ’Ă´Âª Upload iOS Artifact (.ipa)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: |
            dist/app.ipa
            build-logs/ios-build-log.json
          if-no-files-found: warn
          retention-days: 7
