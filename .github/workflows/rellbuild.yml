# RellBuild: PIPELINE CLOUD BLINDADO (EAS Cloud Native)
# Data: 2026-03-30
# Engenheiro Responsável: RellBuild Sênior

name: 🚀 Build & Submit Mobile (EAS Cloud)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ RellBuild Pipeline
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Apple Store Connect API Key (Obrigatório para modo não-interativo)
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      EXPO_APPLE_TEAM_TYPE: "COMPANY_OR_ORGANIZATION"
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      # Firebase Secrets (Usando os nomes exatos do seu GitHub)
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      # Variáveis de Ambiente Públicas (Injetadas no Build)
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      EXPO_PUBLIC_APP_NAME: "Açucaradas Encomendas"
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      APP_ENV: "production"

    steps:
      # 🔹 1. Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 🔹 2. Setup Node
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 🔹 3. Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      # 🔹 4. Install EAS CLI
      - name: ⚙️ Setup EAS CLI
        run: npm install -g eas-cli@latest

      # 🔹 5. Validation, Credential Hardening & Build (iOS-BUILD-GUARDIAN)
      - name: 🛡️ iOS-BUILD-GUARDIAN (Secure iOS Build)
        if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        run: |
          chmod +x ./scripts/ci/ios-build-guardian.sh
          ./scripts/ci/ios-build-guardian.sh

      # 🔹 6. Expo Doctor (Optional check)
      - name: 🩺 Expo Doctor
        run: npx expo-doctor

      # 🔹 7. Submit iOS to TestFlight
      - name: 📤 Submit iOS (TestFlight)
        if: success() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')
        run: |
          echo "📤 Enviando build iOS mais recente para TestFlight..."
          eas submit --platform ios --latest --non-interactive

      # 🔹 8. Status Final
      - name: ✅ Pipeline Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🔥 Pipeline finalizado com sucesso absoluto!"
          else
            echo "❌ Pipeline falhou. Verifique as etapas acima."
            exit 1
          fi
