name: 🚀 iOS PRODUCTION RELEASE
on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Tipo de incremento (patch, minor, major)'
        required: true
        default: 'patch'

jobs:
  ios-production:
    runs-on: macos-latest
    steps:
      - name: 🏗️ 1. Checkout Main (Production)
        uses: actions/checkout@v4
        with:
          ref: prod-release-1170

      - name: 🟢 2. Setup Node.js (Fixed Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 3. Install Dependencies (Clean)
        run: npm ci

      - name: � 3.1. Prepare Config Files
        run: |
          # Use sed to handle escaped newlines if present
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | sed 's/\\n/\n/g' > GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | sed 's/\\n/\n/g' > google-services.json
          
          # Check if files are created and valid
          if [ ! -s "GoogleService-Info.plist" ]; then echo "❌ GoogleService-Info.plist is empty"; exit 1; fi
          if [ ! -s "google-services.json" ]; then echo "❌ google-services.json is empty"; exit 1; fi
          
          echo "✅ Config files prepared."
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: � 4. Hard Typecheck & Lint
        run: |
          npm run type-check

      - name: 🔢 5. Increment Build Number
        run: node ./scripts/prepare-ios-build.js
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: 🔐 5.1. Cleanup & Prepare Credentials
        run: |
          # Cleanup conflicts
          unset IOS_DIST_CERT_BASE64
          unset IOS_PROV_PROFILE_BASE64
          unset IOS_CERT_PASSWORD
          unset EXPO_APP_STORE_CONNECT_API_KEY

          # Normalize ASC Private Key
          echo "${{ secrets.EXPO_ASC_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > AuthKey.p8
          
          echo "EXPO_ASC_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat AuthKey.p8 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Verificar se a chave foi criada
          if [ ! -s "AuthKey.p8" ]; then echo "❌ AuthKey.p8 is empty"; exit 1; fi
          ls -l AuthKey.p8
        env:
          EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}

      - name: 🚀 6. Prepare Native & Execute EAS Local Build
        run: |
          echo "--- 🔍 Debug Config ---"
          ls -la GoogleService-Info.plist google-services.json
          npx expo config --type prebuild
          
          echo "--- 🛠️ Starting Expo Prebuild ---"
          # Use --no-install to separate pod install for better debugging
          EXPO_DEBUG=1 npx expo prebuild --platform ios --non-interactive --no-install --verbose 2>&1 | tee prebuild.log || {
            echo "❌ Expo Prebuild Failed. Last 100 lines of log:"
            tail -n 100 prebuild.log
            exit 1
          }
          
          if [ ! -d "ios" ]; then
            echo "❌ Error: 'ios' directory was not created by prebuild."
            exit 1
          fi

          echo "--- 📦 Starting Pod Install ---"
          cd ios
          # Ensure CocoaPods is using the right encoding
          export LANG=en_US.UTF-8
          pod install --repo-update --verbose 2>&1 | tee ../pod_install.log || { 
            echo "❌ Pod install failed. Last 100 lines of log:"
            tail -n 100 ../pod_install.log
            exit 1; 
          }
          cd ..
          
          echo "--- 🚀 Starting EAS Local Build ---"
          # Ensure all env vars are available
          EXPO_DEBUG=1 npx eas build --platform ios --local --profile production --non-interactive --verbose 2>&1 | tee eas_build.log || {
            echo "❌ EAS Build Failed. Last 100 lines of log:"
            tail -n 100 eas_build.log
            exit 1
          }
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_PRIVATE_KEY: ${{ env.EXPO_ASC_PRIVATE_KEY }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          EXPO_DEBUG: 1
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_APP_NAME: "Açucaradas Encomendas"
          EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"

      - name: 🍎 8. Submit to TestFlight
        run: |
          npx eas submit -p ios --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}

      - name: 🏁 9. Final Report
        run: |
          echo "✅ Build de Produção concluído e enviado ao TestFlight."
          echo "Build Number: $(cat version-state.json | jq -r .buildNumber)"
