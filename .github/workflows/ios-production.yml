name: آ­ئ’أœأ‡ iOS PRODUCTION RELEASE

concurrency:
  group: ios-release-lock
  cancel-in-progress: true

on:
  push:
    branches:
      - prod-release-1170
  workflow_dispatch:
    inputs:
      release_approved:
        description: 'Aprovar build de produâ”œآ؛â”œأ؛o?'
        required: true
        default: 'true'
        type: boolean
      build_mode:
        description: 'Modo de Build'
        required: true
        default: 'LOCAL'
        type: choice
        options:
          - LOCAL
          - CLOUD

jobs:
  ios-hybrid-pipeline:
    name: Hybrid Pipeline
    runs-on: macos-latest
    timeout-minutes: 90
    
    env:
      RELEASE_APPROVED: "true"
      TARGET_APP: "acucaradas-encomendas"
      APP_ENV: "production"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_VAPID_KEY }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_EXPO_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_EXPO_CLIENT_ID }}
      PROFILE: "production"
      FORCE_BUILD_MODE: ${{ github.event.inputs.build_mode || 'LOCAL' }}
      FIXED_BUILD_NUMBER: 1170

    steps:
      - name: آ­ئ’آ؛â•£ Clean Previous Zombie Processes
        run: |
          echo "آ­ئ’آ؛â•£ [CLEAN] Killing previous zombie build processes..."
          killall xcodebuild || true
          killall SWBBuildService || true
          killall node || true
          killall tail || true

      - name: آ­ئ’أ¶أ¬ Debug Context & Environment
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Release Approved: $RELEASE_APPROVED"
          echo "Xcode version:"
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks

      - name: آ­ئ’أ…أ¹آ´آ©أ… Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: prod-release-1170

      - name: آ­ئ’ئ’أ³ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: آ­ئ’أ¸أ­آ´آ©أ… Hardening macOS Runner Environment
        run: |
          # 1. Fix Xcode path
          sudo xcode-select -s /Applications/Xcode.app
          
          # 2. Fix Ruby/CocoaPods environment (LibYAML issue)
          brew install libyaml || brew link --overwrite libyaml
          
          # 3. Fix npm/node-gyp issues
          npm install -g node-gyp
          
          # 4. Global EAS CLI
          npm install -g eas-cli@latest
          
          # 5. Set CI environment variables
          echo "CI=true" >> $GITHUB_ENV
          echo "TERM=dumb" >> $GITHUB_ENV

      - name: آ­ئ’أ´آھ Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g eas-cli
          
      - name: ًں©¹ Patch React Native (NativeAnimatedHelper.js)
        run: |
          echo "ًں©¹ [PATCH] Corrigindo NativeAnimatedHelper.js para RN 0.76..."
          # Substituir '}) as $NonMaybeType' por '}) : $NonMaybeType' para compatibilidade com parser Flow
          sed -i '' 's/}) as \$NonMaybeType/}) : \$NonMaybeType/g' node_modules/react-native/src/private/animated/NativeAnimatedHelper.js
          echo "âœ… [PATCH] NativeAnimatedHelper.js corrigido."

      - name: آ­ئ’أ´أ¬ Typecheck
        run: npm run type-check

      - name: آ­ئ’أ¸أ­آ´آ©أ… Build Number Enforcer (Source of Truth)
        run: |
          echo "آ­ئ’أ¶أ¤ [ENFORCE] Sincronizando Build Number (V7.0)..."
          # Ensure build number is 1170
          node scripts/prepare-ios-build.js
          
          # Exportar variâ”œأ­veis para o ambiente do runner
          BUILD_NUMBER=$(jq -r '.expo.ios.buildNumber' app.json)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "CURRENT_BN=$BUILD_NUMBER" >> $GITHUB_ENV
          
      - name: آ­ئ’أ„آ؟ Verify Assets Integrity
        run: |
          echo "آ­ئ’أ¶أ¬ [ASSETS] Verificando integridade das imagens..."
          if [ ! -f "assets/app-icon.png" ]; then
            echo "أ”أکأ® [FATAL] assets/app-icon.png nâ”œأ؛o encontrado!"
            exit 1
          fi
          if [ ! -f "assets/splash.png" ]; then
            echo "أ”أکأ® [FATAL] assets/splash.png nâ”œأ؛o encontrado!"
            exit 1
          fi
          echo "أ”آ£أ  [OK] Assets detectados com sucesso."

      - name: ًں›،ï¸ڈ iOS-BUILD-GUARDIAN (Local Mode)
        run: |
          chmod +x ./scripts/ci/ios-build-guardian.sh
          EXPO_DEBUG=1 ./scripts/ci/ios-build-guardian.sh
        env:
          FORCE_BUILD_MODE: "LOCAL"
          DEBUG: "eas:*"
          PROFILE: "production"

      - name: ًں“„ Show Build Logs on Failure
        if: failure()
        run: |
          echo "â‌Œ [DEBUG] Build failed. Displaying logs..."
          if [ -f "build-logs/eas-build-local.log" ]; then
            echo "ًں“„ [EAS BUILD LOG]"
            tail -n 100 build-logs/eas-build-local.log
          fi
          if [ -f "build-logs/acucaradas-encomendas/submission.log" ]; then
            echo "ًں“„ [SUBMISSION LOG]"
            tail -n 100 build-logs/acucaradas-encomendas/submission.log
          fi

      - name: آ­ئ’أ´آھ Upload iOS Artifact (.ipa)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: |
            dist/app.ipa
            build-logs/ios-build-log.json
          if-no-files-found: warn
          retention-days: 7
