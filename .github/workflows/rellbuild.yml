name: RellBuild Beta Pipeline

on:
  push:
    branches:
      - main
      - master
      - upgrade/sdk-52-rn-076
  workflow_dispatch:

jobs:
  validate-and-build:
    name: RellBuild Validation & Build
    runs-on: macos-latest
    env:
      ACTIONS_STEP_DEBUG: true
      CI: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID || '7L9P9U9Z9R' }}
      EXPO_ASC_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
      EXPO_APP_STORE_CONNECT_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      SUBMIT_ENABLED: "true"
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Security Audit (Non-blocking)
        run: npm audit --audit-level=high || echo "⚠️ Vulnerabilidades encontradas, mas prosseguindo conforme solicitado."

      - name: RellBuild Prebuild Validation
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
        run: |
          echo "Injetando segredos e configurando ambiente..."
          
          # Criar .env para o build (Expo SDK 52 usa EXPO_PUBLIC_*)
          cat <<EOF > .env
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY=$EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY
          EXPO_PUBLIC_ONESIGNAL_APP_ID=$EXPO_PUBLIC_ONESIGNAL_APP_ID
          EXPO_PUBLIC_SENTRY_DSN=$EXPO_PUBLIC_SENTRY_DSN
          EXPO_PUBLIC_SENTRY_ENABLED=$EXPO_PUBLIC_SENTRY_ENABLED
          EXPO_PUBLIC_PROJECT_ID=$EXPO_PUBLIC_PROJECT_ID
          SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN
          EOF
          
          # Remover espacos extras do .env
          sed -i '' 's/^[[:space:]]*//' .env || sed -i 's/^[[:space:]]*//' .env
          
          echo "Arquivo .env gerado para o build."

          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/*.js 2>/dev/null || true
          
          # Rodar validacao
          bash ./scripts/rellbuild-prebuild.sh

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check EAS Status
        run: |
          eas whoami
          eas project:info

      - name: Validate Expo Config
        run: npx expo config --json

      - name: Expo Doctor Check
        run: npx expo-doctor . --fix-dependencies

      - name: Build Android Beta (APK)
        id: android_beta
        if: "!contains(github.event.head_commit.message, '[skip-android]') && !contains(github.event.head_commit.message, '[ios-only]')"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo "Verificando arquivos Firebase..."
          ls -la google-services.json GoogleService-Info.plist || echo "⚠️ Arquivos Firebase não encontrados no root!"
          
          echo "Iniciando build local do Android (Beta)..."
          eas build --platform android --profile beta --local --non-interactive --output app-beta.apk
          ls -la app-beta.apk || true

      - name: Build iOS Release (IPA)
        id: ios_release
        if: "always() && !cancelled() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID || '7L9P9U9Z9R' }}
          EXPO_ASC_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
          EXPO_APP_STORE_CONNECT_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo "Iniciando build local do iOS (Release)..."
          
          # Injetar ASC API Key via secret direto para evitar escapes do shell
          if [[ "${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}" == \{* ]]; then
            echo "Detectada ASC API Key em formato JSON. Extraindo..."
            echo '${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}' > asc-key.json
            if command -v jq >/dev/null 2>&1 && jq . asc-key.json >/dev/null 2>&1; then
              export EXPO_ASC_KEY_ID=$(jq -r '.keyId' asc-key.json)
              export EXPO_ASC_ISSUER_ID=$(jq -r '.issuerId' asc-key.json)
              jq -r '.key' asc-key.json > AuthKey.p8
              export EXPO_ASC_API_KEY_PATH=$(pwd)/AuthKey.p8
              echo "✅ ASC API Key extraída com sucesso."
            else
              echo "⚠️ Falha no parse. Tentando via env variable..."
              printf "%s" "$EXPO_ASC_API_KEY" > asc-key.json
              if jq . asc-key.json >/dev/null 2>&1; then
                export EXPO_ASC_KEY_ID=$(jq -r '.keyId' asc-key.json)
                export EXPO_ASC_ISSUER_ID=$(jq -r '.issuerId' asc-key.json)
                jq -r '.key' asc-key.json > AuthKey.p8
                export EXPO_ASC_API_KEY_PATH=$(pwd)/AuthKey.p8
                echo "✅ ASC API Key extraída com sucesso (v2)."
              else
                echo "❌ Falha crítica no parse da ASC Key."
                export EXPO_ASC_API_KEY_PATH=$(pwd)/asc-key.json
              fi
            fi
          fi

          echo "Executando prebuild para validar config iOS..."
          npx expo prebuild --platform ios --no-install
          
          if [ -d "ios" ]; then
            echo "✅ Pasta 'ios' gerada com sucesso!"
          else
            echo "❌ Falha ao gerar pasta 'ios'!"
            exit 1
          fi
          
          echo "Iniciando compilação nativa com EAS CLI..."
          # Usar build-local se necessário, mas o problema pode ser a falta de credenciais remotas prontas
          # Tentar injetar as variáveis exportadas explicitamente
          export EXPO_ASC_KEY_ID=$EXPO_ASC_KEY_ID
          export EXPO_ASC_ISSUER_ID=$EXPO_ASC_ISSUER_ID
          export EXPO_ASC_API_KEY_PATH=$EXPO_ASC_API_KEY_PATH
          
          eas build --platform ios --profile production --local --non-interactive --output app-release.ipa
          
          echo "Verificando se o IPA foi gerado..."
          ls -la app-release.ipa || echo "❌ app-release.ipa não encontrado no root!"
          
          if [ ! -f "app-release.ipa" ]; then
            echo "Buscando IPA em subdiretórios..."
            find . -name "*.ipa"
          fi

      - name: Build Android Release (AAB)
        id: android_release
        if: "always() && !cancelled() && !contains(github.event.head_commit.message, '[skip-android]') && !contains(github.event.head_commit.message, '[ios-only]')"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo "Iniciando build local do Android (Release)..."
          eas build --platform android --profile production --local --non-interactive --output app-release.aab
          ls -la app-release.aab || echo "❌ app-release.aab não encontrado no root!"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: rellbuild-artifacts
          path: |
            app-beta.apk
            app-release.aab
            app-release.ipa
          if-no-files-found: warn

      - name: RellBuild Final Report
        if: always()
        run: |
          echo "### RellBuild Status"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build concluído com sucesso!"
          else
            echo "❌ Build falhou. Verifique os logs acima."
          fi

      - name: Submit iOS to TestFlight
        if: success() && env.SUBMIT_ENABLED == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID || '7L9P9U9Z9R' }}
          EXPO_ASC_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
          EXPO_APP_STORE_CONNECT_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "Verificando artefato iOS..."
          ls -la app-release.ipa || true
          
          if [ -f "app-release.ipa" ]; then
            echo "🚀 Iniciando submissão iOS para TestFlight..."
            
            # Injetar ASC API Key via secret direto para submissão
            if [[ "${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}" == \{* ]]; then
              echo "Configurando ASC API Key para submissão..."
              echo '${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}' > asc-key-submit.json
              if command -v jq >/dev/null 2>&1 && jq . asc-key-submit.json >/dev/null 2>&1; then
                export EXPO_ASC_KEY_ID=$(jq -r '.keyId' asc-key-submit.json)
                export EXPO_ASC_ISSUER_ID=$(jq -r '.issuerId' asc-key-submit.json)
                jq -r '.key' asc-key-submit.json > AuthKeySubmit.p8
                export EXPO_ASC_API_KEY_PATH=$(pwd)/AuthKeySubmit.p8
                echo "✅ Credenciais ASC extraídas para submissão."
              else
                echo "⚠️ Falha no parse. Tentando via env variable..."
                printf "%s" "$EXPO_ASC_API_KEY" > asc-key-submit.json
                if jq . asc-key-submit.json >/dev/null 2>&1; then
                  export EXPO_ASC_KEY_ID=$(jq -r '.keyId' asc-key-submit.json)
                  export EXPO_ASC_ISSUER_ID=$(jq -r '.issuerId' asc-key-submit.json)
                  jq -r '.key' asc-key-submit.json > AuthKeySubmit.p8
                  export EXPO_ASC_API_KEY_PATH=$(pwd)/AuthKeySubmit.p8
                  echo "✅ Credenciais ASC extraídas via printf."
                else
                  echo "⚠️ Usando arquivo bruto para submissão."
                  export EXPO_ASC_API_KEY_PATH=$(pwd)/asc-key-submit.json
                fi
              fi
            fi

            eas submit -p ios --path app-release.ipa --non-interactive
          else
            echo "⚠️ Arquivo app-release.ipa não encontrado no root. Buscando..."
            IPA_PATH=$(find . -name "app-release.ipa" | head -n 1)
            if [ ! -z "$IPA_PATH" ]; then
              echo "Encontrado em: $IPA_PATH. Submetendo..."
              eas submit -p ios --path "$IPA_PATH" --non-interactive
            else
              echo "❌ Falha crítica: app-release.ipa não existe em nenhum lugar."
              exit 1
            fi
          fi

      - name: Submit Android to Play Store
        if: success() && env.SUBMIT_ENABLED == 'true' && !contains(github.event.head_commit.message, '[ios-only]')
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -f "app-release.aab" ]; then
            echo "🚀 Iniciando submissão Android para Google Play (Internal)..."
            
            if [ ! -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
              echo "Configurando credenciais locais via GOOGLE_SERVICE_ACCOUNT_JSON..."
              echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
              eas submit -p android --path app-release.aab --service-account-key-path google-service-account.json --non-interactive --profile preview
            else
              echo "⚠️ GOOGLE_SERVICE_ACCOUNT_JSON não configurado no GitHub Secrets."
              exit 1
            fi
          else
            echo "⚠️ Arquivo app-release.aab não encontrado no root. Buscando..."
            AAB_PATH=$(find . -name "app-release.aab" | head -n 1)
            if [ ! -z "$AAB_PATH" ]; then
              echo "Encontrado em: $AAB_PATH. Submetendo..."
              eas submit -p android --path "$AAB_PATH" --service-account-key-path google-service-account.json --non-interactive --profile preview
            else
              echo "❌ Falha crítica: app-release.aab não existe."
              exit 1
            fi
          fi
