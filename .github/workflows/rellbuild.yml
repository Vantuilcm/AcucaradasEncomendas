# RellBuild: PIPELINE CLOUD BLINDADO (EAS Cloud Native)
# Data: 2026-03-30
# Engenheiro Responsável: RellBuild Sênior

name: 🚀 Build & Submit Mobile (EAS Cloud)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ RellBuild Pipeline
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Firebase Base64 Secrets
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      # Outras ENVs necessárias para o build
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      APP_ENV: "production"

    steps:
      # 🔹 1. Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 🔹 2. Setup Node
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 🔹 3. Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      # 🔹 4. Install EAS CLI
      - name: ⚙️ Install EAS CLI
        run: npm install -g eas-cli

      # 🔹 5. Validation & Firebase Injection (FAIL FAST)
      - name: 🛡️ Validate & Inject Firebase
        run: |
          echo "🔍 Validando ambiente e injetando arquivos críticos..."
          
          # Validar EXPO_TOKEN
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ ERRO: EXPO_TOKEN não configurado no GitHub Secrets!"
            exit 1
          fi

          # Injetar google-services.json (Android)
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "🤖 Gerando google-services.json a partir do Base64..."
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json
          else
            echo "⚠️ AVISO: GOOGLE_SERVICES_JSON_BASE64 ausente. Verificando arquivo local..."
            if [ ! -f "google-services.json" ]; then
              echo "❌ ERRO: google-services.json não encontrado nem em Base64 nem local!"
              exit 1
            fi
          fi

          # Injetar GoogleService-Info.plist (iOS)
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "🍏 Gerando GoogleService-Info.plist a partir do Base64..."
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > GoogleService-Info.plist
          else
            echo "⚠️ AVISO: GOOGLE_SERVICE_INFO_PLIST_BASE64 ausente. Verificando arquivo local..."
            if [ ! -f "GoogleService-Info.plist" ]; then
              echo "❌ ERRO: GoogleService-Info.plist não encontrado nem em Base64 nem local!"
              exit 1
            fi
          fi

          echo "✅ Validação e Injeção concluídas com sucesso."

      # 🔹 6. Check EAS Login
      - name: 🔎 Verify EAS Auth
        run: eas whoami

      # 🔹 7. Build Android (Cloud)
      - name: 🤖 Build Android (EAS Cloud)
        if: "!contains(github.event.head_commit.message, '[skip-android]') && !contains(github.event.head_commit.message, '[ios-only]')"
        run: |
          echo "🚀 Iniciando build Android no EAS Cloud..."
          eas build --platform android --profile production --non-interactive

      # 🔹 8. Build iOS (Cloud)
      - name: 🍏 Build iOS (EAS Cloud)
        if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        run: |
          echo "🚀 Iniciando build iOS no EAS Cloud..."
          eas build --platform ios --profile production_v13 --non-interactive

      # 🔹 9. Submit iOS to TestFlight
      - name: 📤 Submit iOS (TestFlight)
        if: success() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')
        run: |
          echo "📤 Enviando build iOS mais recente para TestFlight..."
          eas submit --platform ios --latest --non-interactive

      # 🔹 10. Status Final
      - name: ✅ Pipeline Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🔥 Pipeline finalizado com sucesso absoluto!"
          else
            echo "❌ Pipeline falhou. Verifique as etapas acima para identificar o erro."
            exit 1
          fi
