name: 🚀 Build & Submit Mobile (EAS Cloud)

concurrency:
  group: ios-build
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  ios-hybrid-pipeline:
    name: 🍎 Hybrid Pipeline
    # Forçando trigger para validar o novo nome do workflow (v2)
    runs-on: macos-latest
    
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
      # Variáveis EXPO_PUBLIC_* injetadas automaticamente
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_MONITORING_REMOTE_ENABLED: ${{ secrets.EXPO_PUBLIC_MONITORING_REMOTE_ENABLED }}
      PROFILE: "production_v13"

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: ⚙️ Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔄 Enterprise Sync (Build Number)
        run: node scripts/sync-build-with-apple.js

      - name: 🛡️ iOS-BUILD-GUARDIAN (Cloud Mode)
        run: |
          chmod +x ./scripts/ci/ios-build-guardian.sh
          ./scripts/ci/ios-build-guardian.sh
        env:
          FORCE_BUILD_MODE: "CLOUD"

      - name: 📦 Upload iOS Artifact (.ipa)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: |
            dist/app.ipa
            build-logs/ios-build-log.json
          if-no-files-found: warn
          retention-days: 7

      - name: 🚀 Submit to TestFlight
        if: success()
        run: |
          chmod +x scripts/ci/ios-submit-testflight.sh
          scripts/ci/ios-submit-testflight.sh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}

      - name: 🛡️ Post-Release Health Check (Release Guardian)
        if: success()
        run: node scripts/post-release-monitor.js
