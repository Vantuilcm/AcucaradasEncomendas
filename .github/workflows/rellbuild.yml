# RellBuild: PIPELINE FINAL BLINDADO (GitHub Actions)
# Data: 2026-03-30
# Objetivo: Build Android (Local Grátis) + Build iOS (Cloud) + Submit TestFlight Automático

name: 🚀 Build & Submit Mobile (iOS + Android)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ RellBuild Pipeline
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID || '7L9P9U9Z9R' }}
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      # Injetando envs do app para garantir build correto
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      # 🔹 1. Checkout
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 🔹 2. Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 🔹 3. Install deps
      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      # 🔹 4. Install Expo + EAS
      - name: ⚙️ Install Expo & EAS CLI
        run: npm install -g expo-cli eas-cli

      # 🔹 5. Login Expo
      - name: 🔐 Login Expo
        run: eas login --token ${{ secrets.EXPO_TOKEN }}

      # 🔹 6. Validar EAS
      - name: 🔎 Check EAS
        run: eas whoami

      # 🔹 7. Build Android (GRÁTIS LOCAL)
      - name: 🤖 Build Android (local)
        if: "!contains(github.event.head_commit.message, '[skip-android]') && !contains(github.event.head_commit.message, '[ios-only]')"
        run: |
          echo "🚀 Iniciando build Android local (gratuito)..."
          eas build --platform android --profile production --local --non-interactive

      # 🔹 8. Build iOS (CLOUD FREE)
      - name: 🍏 Build iOS (cloud)
        if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        run: |
          echo "🚀 Iniciando build iOS no EAS Cloud..."
          eas build --platform ios --profile production_v13 --non-interactive

      # 🔹 9. Submit iOS
      - name: 📦 Submit iOS (TestFlight)
        if: success() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')
        run: |
          echo "📤 Enviando para TestFlight via --latest..."
          eas submit --platform ios --latest --non-interactive

      # 🔹 10. Status final
      - name: ✅ Done
        if: always()
        run: |
          echo "🔥 Pipeline finalizado com sucesso!"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build e Submit concluídos."
          else
            echo "❌ Algo deu errado. Verifique os logs acima."
          fi
