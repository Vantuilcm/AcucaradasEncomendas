name: 🚀 Build Android (EAS Local)

concurrency:
  group: android-release-lock
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  # workflow_dispatch removido para evitar duplo trigger acidental em produção
  # workflow_dispatch:

jobs:
  android-hybrid-pipeline:
    name: 🤖 Android Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Adicionado filtro de release obrigatório no nível do JOB para paridade com iOS
    if: contains(github.event.head_commit.message, '[release]')
    
    env:
      RELEASE_APPROVED: ${{ github.event.inputs.release_approved == 'true' || contains(github.event.head_commit.message, '[release]') }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_MONITORING_REMOTE_ENABLED: ${{ secrets.EXPO_PUBLIC_MONITORING_REMOTE_ENABLED }}
      PROFILE: "production_v13"

    steps:
      - name: 🔍 Debug Context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Release Approved: $RELEASE_APPROVED"
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "Commit Message: ${{ github.event.head_commit.message }}"
          fi

      - name: 🛡️ Validate Release Approval
        run: |
          echo "🔍 Checking release approval..."
          if [ "${RELEASE_APPROVED}" != "true" ]; then
            echo "❌ Android production build blocked: RELEASE_APPROVED=false"
            echo "💡 Dica: Adicione '[release]' na mensagem do commit ou use o disparo manual com aprovação."
            exit 1
          else
            echo "✅ Android production build approved via commit tag or manual trigger"
          fi

      - name: 🏗️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: ☕ Setup Java (Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🛡️ Build Number Enforcer (Source of Truth)
        run: |
          echo "🔄 [ENFORCE] Sincronizando Build Number (V7.0)..."
          node scripts/ci/force-build-number.js --run
          
          # Exportar variáveis para o ambiente do runner
          VERSION_CODE=$(jq -r '.expo.android.versionCode' app.json)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "CURRENT_BN=$VERSION_CODE" >> $GITHUB_ENV

      - name: 🎨 Verify Assets Integrity
        run: |
          echo "🔍 [ASSETS] Verificando integridade das imagens..."
          if [ ! -f "assets/app-icon.png" ]; then
            echo "❌ [FATAL] assets/app-icon.png não encontrado!"
            exit 1
          fi
          if [ ! -f "assets/splash.png" ]; then
            echo "❌ [FATAL] assets/splash.png não encontrado!"
            exit 1
          fi
          echo "✅ [OK] Assets detectados com sucesso."

      - name: 🛡️ Android-BUILD-GUARDIAN (Local Mode)
        run: |
          chmod +x ./scripts/ci/android-build-guardian.sh
          ./scripts/ci/android-build-guardian.sh
        env:
          FORCE_BUILD_MODE: "LOCAL"

      - name: 📦 Upload Android Artifact (.aab)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-aab
          path: |
            dist/app.aab
            build-logs/eas-build-android-local.log
          if-no-files-found: warn
          retention-days: 7
