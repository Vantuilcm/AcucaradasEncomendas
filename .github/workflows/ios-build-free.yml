          EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB: "627855691834-d3jm1hc7o3p6l6j26mc8u3ouhve27iqv.apps.googleusercontent.com"
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: "627855691834-cg7iut6b6ebf7tl3eu09icmpbq14h489.apps.googleusercontent.com"
          EXPO_PUBLIC_GOOGLE_EXPO_CLIENT_ID: "627855691834-5oflaa1nve907gro3ntehub8g8smg83l.apps.googleusercontent.com"
          
          # Other Original App Configs
          EXPO_PUBLIC_API_URL: "https://api.acucaradasencomendas.com.br"
          EXPO_PUBLIC_APP_ENV: "production"
          EXPO_PUBLIC_APP_NAME: "Açucaradas Encomendas"
          EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
          EXPO_PUBLIC_APP_VERSION: "1.0.1"
          EXPO_PUBLIC_ENABLE_SENTRY: "false"
          EXPO_PUBLIC_ENABLE_ONESIGNAL: "true"
          EXPO_PUBLIC_ONESIGNAL_APP_ID: "2df9c7f0-6fb7-4cbe-87e9-c6fb116203f7"
          EXPO_PUBLIC_APPLE_MERCHANT_ID: "merchant.com.acucaradas.encomendas"
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${{ secrets.STRIPE_PUBLISHABLE_KEY }}"
          EXPO_PUBLIC_ENABLE_DEVICE_SECURITY_CHECKS: "true"



      # Removido: Upload de IPA local (não aplicável em EAS Cloud)

      - name: Submit to TestFlight (App Store)
        run: |
          echo "Iniciando upload para o TestFlight..."
          eas submit --platform ios --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
