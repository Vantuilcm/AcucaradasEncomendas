name: 🛠️ iOS RESET DIAGNOSTIC 1170
# MISSÃO CRÍTICA: Reset total para restaurar estabilidade do iOS

on:
  workflow_dispatch:
    inputs:
      confirm_reset:
        description: 'Confirmar RESET TOTAL iOS?'
        required: true
        default: 'true'
        type: boolean

jobs:
  ios-reset-build:
    name: Reset Diagnostic Build
    runs-on: macos-latest
    timeout-minutes: 60
    
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
      # Variáveis mínimas de ambiente para o app não quebrar no boot
      EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      CI: true
      TERM: dumb

    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (Node 20 - Stability)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🛠️ Prepare Environment
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          npm install -g eas-cli@latest
          
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 📁 Restore Firebase Config
        run: |
          if [ -n "$GOOGLE_SERVICES_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICES_INFO_PLIST_BASE64" | base64 --decode > GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist restaurado."
          else
            echo "❌ GoogleService-Info.plist ausente!"
            exit 1
          fi

      - name: 🔑 Normalize ASC Private Key
        run: |
          echo "$EXPO_ASC_PRIVATE_KEY" | sed 's/\\\\n/\\n/g' > AuthKey.p8
          # Exportar para o EAS CLI reconhecer via ENV
          echo "EXPO_ASC_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat AuthKey.p8 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "✅ ASC Private Key normalizada."

      - name: 🧹 Clean & Prebuild
        run: |
          npx expo prebuild --platform ios --clean
          echo "✅ Prebuild limpo concluído."

      - name: 🚀 Execute EAS Local Build (DIAGNOSTIC)
        run: |
          EAS_LOCAL_BUILD_SKIP_CLEANUP=1 EXPO_DEBUG=1 npx eas build --platform ios --local --profile production_v13 --non-interactive --verbose
        
      - name: 📦 Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-diagnostic-ipa
          path: "**/*.ipa"
          if-no-files-found: warn
