# Workflow for GitHub-hosted iOS builds (Deep Cleaned)
name: iOS Production Build (GitHub Free)

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
      - upgrade/sdk-52-rn-076
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag)'
        required: true
        default: 'upgrade/sdk-52-rn-076'
        type: string
      profile:
        description: 'EAS Build Profile'
        required: true
        default: 'production_local'
        type: choice
        options:
          - production_local
          - preview
          - development
      mode:
        description: 'Modo de execucao'
        required: true
        default: 'github_macos'
        type: choice
        options:
          - audit_only
          - github_macos
      publish_update:
        description: 'Publicar EAS Update (OTA)'
        required: true
        default: false
        type: boolean
  repository_dispatch:
    types:
      - ios_build_free

env:
  INPUT_REF: ${{ github.event.inputs.ref || github.event.client_payload.ref || github.ref }}
  INPUT_PROFILE: ${{ github.event.inputs.profile || github.event.client_payload.profile || 'production_local' }}
  INPUT_MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'github_macos' }}
  INPUT_PUBLISH_UPDATE: ${{ github.event.inputs.publish_update || github.event.client_payload.publish_update || 'false' }}

jobs:
  preflight:
    name: Preflight (JS)
    runs-on: ubuntu-latest
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: 1
      SENTRY_ALLOW_FAILURE: 1
      EXPO_PUBLIC_ENABLE_SENTRY: 0
      SENTRY_AUTH_TOKEN: ''
      SENTRY_ORG: ''
      SENTRY_PROJECT: ''
      SENTRY_URL: ''
      SENTRY_DSN: ''
      NO_SENTRY_VALIDATE: 1
    steps:
      - name: Stub npx sentry-cli (Preflight Early)
        run: |
          STUBBIN="$HOME/.local/bin"
          mkdir -p "$STUBBIN"
          cat > "$STUBBIN/npx" << 'EOF'
          #!/usr/bin/env bash
          if [ "${1:-}" = "sentry-cli" ]; then
            echo "[ci] npx sentry-cli stubbed (preflight early)"
            exit 0
          fi
          if [ -x "/usr/bin/npx" ]; then
            exec /usr/bin/npx "$@"
          fi
          if [ -x "/usr/local/bin/npx" ]; then
            exec /usr/local/bin/npx "$@"
          fi
          command -v npx >/dev/null 2>&1 && exec "$(command -v npx)" "$@"
          echo "[ci] npx not found"
          exit 127
          EOF
          chmod +x "$STUBBIN/npx"
          echo "$STUBBIN" >> $GITHUB_PATH

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Ajustar caminhos de icones
        run: |
          node -e "const fs=require('fs'); const path='app.json'; const raw=fs.readFileSync(path,'utf8'); const data=JSON.parse(raw); const expo=data.expo||{}; expo.icon='./assets/app-icon.png'; const android=expo.android||{}; const adaptive=android.adaptiveIcon||{}; expo.android={...android, adaptiveIcon:{...adaptive, foregroundImage:'./assets/app-icon.png', backgroundColor: adaptive.backgroundColor || '#ffffff'}}; const web=expo.web||{}; expo.web={...web, favicon:'./assets/app-icon.png'}; data.expo=expo; fs.writeFileSync(path, JSON.stringify(data,null,2)); console.log('Icones ajustados para ./assets/app-icon.png');"

      - name: Validar profile gratuito
        run: |
          if [ "${INPUT_PROFILE}" = "production" ]; then
            echo "Use production_local para build gratuito no GitHub."
            exit 1
          fi
          if [ "${INPUT_PROFILE}" != "production_local" ]; then
            echo "Este workflow so permite production_local para evitar EAS Cloud."
            exit 1
          fi

      - name: Stub npx sentry-cli (Preflight)
        run: |
          REAL_NPX="$(command -v npx)"
          mkdir -p ci-bin
          cat > ci-bin/npx << EOF
          #!/usr/bin/env bash
          if [ "${1:-}" = "sentry-cli" ]; then
            echo "[ci] npx sentry-cli stubbed (preflight)"
            exit 0
          fi
          exec "$REAL_NPX" "$@"
          EOF
          chmod +x ci-bin/npx
          echo "$(pwd)/ci-bin" >> $GITHUB_PATH

      - name: Stub sentry-cli (Preflight)
        run: |
          mkdir -p node_modules/.bin
          cat > node_modules/.bin/sentry-cli << 'EOF'
          #!/usr/bin/env bash
          echo "[ci] sentry-cli stubbed (preflight)"
          exit 0
          EOF
          chmod +x node_modules/.bin/sentry-cli

      - name: Neutralizar Sentry (Build)
        run: |
          echo "SENTRY_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "SENTRY_ORG=" >> $GITHUB_ENV
          echo "SENTRY_PROJECT=" >> $GITHUB_ENV
          echo "SENTRY_URL=" >> $GITHUB_ENV
          echo "SENTRY_DSN=" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SENTRY_DSN=" >> $GITHUB_ENV
          rm -f .sentryclirc ios/.sentryclirc
          rm -f sentry.properties ios/sentry.properties
          rm -f .env.sentry-build-plugin ios/.env.sentry-build-plugin
          rm -f ~/.sentryclirc ~/.config/sentry/sentry.properties || true

      - name: Sanitize Sentry Env
        run: |
          echo "SENTRY_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "SENTRY_ORG=" >> $GITHUB_ENV
          echo "SENTRY_PROJECT=" >> $GITHUB_ENV
          echo "SENTRY_URL=" >> $GITHUB_ENV
          echo "SENTRY_DSN=" >> $GITHUB_ENV
          rm -f .sentryclirc sentry.properties
          rm -f ~/.sentryclirc ~/.config/sentry/sentry.properties || true

      - name: Sincronizar com o ultimo commit do branch
        if: ${{ env.INPUT_REF == 'upgrade/sdk-52-rn-076' }}
        run: |
          git fetch origin upgrade/sdk-52-rn-076 --depth=1
          git reset --hard origin/upgrade/sdk-52-rn-076
          git log -1 --oneline

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps --no-audit --fund=false
        env:
          NODE_ENV: development
          NO_SENTRY_VALIDATE: 1

      - name: Forcar buildNumber minimo 362
        run: |
          node -e "const fs=require('fs'); const path='app.json'; const raw=fs.readFileSync(path,'utf8'); const data=JSON.parse(raw); const expo=data.expo||{}; const ios=expo.ios||{}; const build=Number(ios.buildNumber||0); const min=362; if (!Number.isFinite(build) || build < min) { expo.ios={...ios,buildNumber:String(min)}; data.expo=expo; fs.writeFileSync(path, JSON.stringify(data,null,2)); console.log('ios.buildNumber atualizado para', min); } else { console.log('ios.buildNumber ja e >=', min, 'valor atual:', build); }"

      - name: Print Git + app versions
        run: |
          echo "ref=${GITHUB_REF}" 
          echo "sha=${GITHUB_SHA}"
          git log -1 --oneline
          node -e "const fs=require('fs'); const a=JSON.parse(fs.readFileSync('app.json','utf8')).expo||{}; const p=JSON.parse(fs.readFileSync('package.json','utf8'))||{}; console.log('app.json expo.version=', a.version); console.log('app.json ios.buildNumber=', a.ios?.buildNumber); console.log('package.json version=', p.version);"

      - name: Enforce iOS buildNumber >= 360
        run: |
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')).expo||{}; const build=Number(app.ios?.buildNumber||0); const min=360; if (!Number.isFinite(build) || build < min) { console.error('ios.buildNumber invalido ou abaixo de', min, ':', app.ios?.buildNumber); process.exit(1); } console.log('ios.buildNumber ok:', build);"

      - name: Enforce production runs from allowed refs (manual)
        if: ${{ env.INPUT_PROFILE == 'production_local' }}
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "INPUT_REF=${INPUT_REF}"
          REF_INPUT="${INPUT_REF}"
          if [ "$REF_INPUT" != "upgrade/sdk-52-rn-076" ] && [ "$REF_INPUT" != "master" ] && ! [[ "$REF_INPUT" =~ ^v ]]; then
            echo "Producao manual deve rodar a partir de master, upgrade/sdk-52-rn-076 ou tag v* para evitar build de commit antigo."
            echo "Use 'Run workflow' com ref=master, ref=upgrade/sdk-52-rn-076 ou ref=v* (release)."
            exit 1
          fi

      - name: Auditar uso de EAS Local no workflow
        run: |
          if grep -n "eas build --" .github/workflows/ios-build-free.yml | grep -v "grep -n" | grep -v -- "--local" >/dev/null; then
            echo "Encontrado eas build sem --local no workflow."
            grep -n "eas build --" .github/workflows/ios-build-free.yml | grep -v "grep -n"
          else
            echo "Auditoria ok (somente --local)"
          fi

      - name: Print Expo version/runtime (public config)
        run: |
          node -v
          npx expo config --type public --json | node -e "const fs=require('fs'); const raw=JSON.parse(fs.readFileSync(0,'utf8')); const cfg=(raw && (raw.expo||raw.exp)) ? (raw.expo||raw.exp) : raw; console.log('expo.version=', cfg?.version); console.log('ios.buildNumber=', cfg?.ios?.buildNumber); console.log('runtimeVersion=', JSON.stringify(cfg?.runtimeVersion));"
        continue-on-error: true

      - name: Enforce Expo version/buildNumber from app.json
        run: |
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')).expo||{}; const expected={version: app.version, buildNumber: String(app.ios?.buildNumber||'')}; const raw=JSON.parse(require('child_process').execSync('npx expo config --type public --json',{encoding:'utf8'})); const cfg=(raw && (raw.expo||raw.exp)) ? (raw.expo||raw.exp) : raw; const got={version: cfg?.version, buildNumber: String(cfg?.ios?.buildNumber||'')}; console.log('expected', expected); console.log('got', got); if (!expected.version || !expected.buildNumber) { console.error('Missing expo.version or ios.buildNumber in app.json'); process.exit(1); } if (expected.version !== got.version || expected.buildNumber !== got.buildNumber) { console.error('Expo config mismatch (likely wrong commit/config override).'); process.exit(1); }" || true
        continue-on-error: true

      - name: Testes (Opcional)
        continue-on-error: true
        run: npm test -- --runInBand || true

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          expo-cache: false
          eas-cache: false
        env:
          NO_SENTRY_VALIDATE: 1

  build:
    name: Build iOS (Optimized)
    runs-on: macos-14
    needs: preflight
    if: ${{ env.INPUT_MODE == 'github_macos' && env.INPUT_PROFILE == 'production_local' }}
    env:
      EAS_BUILD_PROFILE: production_local
      SENTRY_DISABLE_AUTO_UPLOAD: "1"
      SENTRY_ALLOW_FAILURE: "1"
      EXPO_PUBLIC_ENABLE_SENTRY: 0
      SENTRY_AUTH_TOKEN: ''
      SENTRY_ORG: ''
      SENTRY_PROJECT: ''
      SENTRY_URL: ''
      SENTRY_DSN: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Ajustar caminhos de icones
        run: |
          node -e "const fs=require('fs'); const path='app.json'; const raw=fs.readFileSync(path,'utf8'); const data=JSON.parse(raw); const expo=data.expo||{}; expo.icon='./assets/app-icon.png'; const android=expo.android||{}; const adaptive=android.adaptiveIcon||{}; expo.android={...android, adaptiveIcon:{...adaptive, foregroundImage:'./assets/app-icon.png', backgroundColor: adaptive.backgroundColor || '#ffffff'}}; const web=expo.web||{}; expo.web={...web, favicon:'./assets/app-icon.png'}; data.expo=expo; fs.writeFileSync(path, JSON.stringify(data,null,2)); console.log('Icones ajustados para ./assets/app-icon.png');"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Forcar buildNumber minimo 362
        run: |
          node -e "const fs=require('fs'); const path='app.json'; const raw=fs.readFileSync(path,'utf8'); const data=JSON.parse(raw); const expo=data.expo||{}; const ios=expo.ios||{}; const build=Number(ios.buildNumber||0); const min=362; if (!Number.isFinite(build) || build < min) { expo.ios = { ...ios, buildNumber: String(min) }; data.expo = expo; fs.writeFileSync(path, JSON.stringify(data, null, 2)); console.log('buildNumber atualizado para', min, 'no workspace'); } else { console.log('buildNumber ja esta >=', min, ':', build); }"

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps --no-audit --fund=false || \
          (sleep 30 && npm install --legacy-peer-deps --no-audit --fund=false) || \
          (sleep 60 && npm install --legacy-peer-deps --no-audit --fund=false)
        env:
          NODE_ENV: development

      - name: Print Git + app versions
        run: |
          echo "ref=${GITHUB_REF}" 
          echo "sha=${GITHUB_SHA}"
          git log -1 --oneline
          node -e "const fs=require('fs'); const a=JSON.parse(fs.readFileSync('app.json','utf8')).expo||{}; const p=JSON.parse(fs.readFileSync('package.json','utf8'))||{}; console.log('app.json expo.version=', a.version); console.log('app.json ios.buildNumber=', a.ios?.buildNumber); console.log('package.json version=', p.version);"

      - name: Debug Sentry Env
        run: |
          echo "SENTRY_DISABLE_AUTO_UPLOAD=$SENTRY_DISABLE_AUTO_UPLOAD"
          echo "SENTRY_ALLOW_FAILURE=$SENTRY_ALLOW_FAILURE"

      - name: Sentry Guard (Build)
        run: |
          export SENTRY_DISABLE_AUTO_UPLOAD=1
          export SENTRY_ALLOW_FAILURE=1
          export SENTRY_AUTH_TOKEN=""
          export SENTRY_ORG=""
          export SENTRY_PROJECT=""
          export SENTRY_URL=""
          export SENTRY_DSN=""
          export EXPO_PUBLIC_SENTRY_DSN=""
          echo "SENTRY_DISABLE_AUTO_UPLOAD=$SENTRY_DISABLE_AUTO_UPLOAD"
          echo "SENTRY_ALLOW_FAILURE=$SENTRY_ALLOW_FAILURE"
          rm -f .sentryclirc sentry.properties
          rm -f ios/.sentryclirc ios/sentry.properties
          rm -f ios/.env.sentry-build-plugin
          printf "SENTRY_DISABLE_AUTO_UPLOAD=1\nSENTRY_ALLOW_FAILURE=1\n" > .env.sentry-build-plugin
          mkdir -p ios
          cp .env.sentry-build-plugin ios/.env.sentry-build-plugin
          rm -f ~/.sentryclirc ~/.config/sentry/sentry.properties || true

      - name: Stub global sentry-cli
        run: |
          STUBBIN="$HOME/.local/bin"
          mkdir -p "$STUBBIN"
          echo "$STUBBIN" >> $GITHUB_PATH
          cat > "$STUBBIN/sentry-cli" << 'EOF'
          #!/bin/sh
          echo "[ci] sentry-cli globally stubbed (skip)"
          exit 0
          EOF
          chmod +x "$STUBBIN/sentry-cli"

      - name: Enforce Expo version/buildNumber from app.json
        run: |
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')).expo||{}; const expected={version: app.version, buildNumber: String(app.ios?.buildNumber||'')}; const raw=JSON.parse(require('child_process').execSync('npx expo config --type public --json',{encoding:'utf8'})); const cfg=(raw && (raw.expo||raw.exp)) ? (raw.expo||raw.exp) : raw; const got={version: cfg?.version, buildNumber: String(cfg?.ios?.buildNumber||'')}; console.log('expected', expected); console.log('got', got); if (!expected.version || !expected.buildNumber) { console.error('Missing expo.version or ios.buildNumber in app.json'); process.exit(1); } if (expected.version !== got.version || expected.buildNumber !== got.buildNumber) { console.error('Expo config mismatch (likely wrong commit/config override).'); process.exit(1); }" || true

      - name: Debug node_modules
        run: |
          if [ -d "node_modules/expo-modules-core" ]; then
            echo "Checking expo-modules-core package.json..."
            cat node_modules/expo-modules-core/package.json | grep -E "main|exports"
            echo "Checking expo-modules-core folder structure..."
            ls -F node_modules/expo-modules-core/
            ls -F node_modules/expo-modules-core/build/ || echo "build/ not found!"
          else
            echo "node_modules/expo-modules-core not found!"
          fi
        continue-on-error: true

      - name: Prepare iOS Build
        run: npm run prepare:ios
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          APPLE_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          APPLE_PROVISION_BASE64: ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          ONESIGNAL_CERT_BASE64: ${{ secrets.ONESIGNAL_CERT_BASE64 }}
          ONESIGNAL_PROVISION_BASE64: ${{ secrets.ONESIGNAL_PROVISION_BASE64 }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_NO_CAPABILITY_SYNC: 1
          EXPO_USE_METRO_WORKSPACE_ROOT: 1
          EXPO_NO_TELEMETRY: 1
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          expo-cache: false
          eas-cache: false

      - name: Install xcbeautify
        run: |
          if command -v xcbeautify >/dev/null 2>&1; then
            echo "xcbeautify ja instalado"
          else
            brew install xcbeautify
          fi

      - name: Select Xcode (16.2 ou padrao do runner)
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            SELECTED="/Applications/Xcode_16.2.app/Contents/Developer"
            echo "Selecionando Xcode 16.2 em $SELECTED"
          elif [ -d "/Applications/Xcode.app" ]; then
            SELECTED="/Applications/Xcode.app/Contents/Developer"
            echo "Xcode_16.2.app nao encontrado, usando Xcode padrao em $SELECTED"
          else
            echo "Nenhuma instalacao de Xcode encontrada em /Applications"
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          sudo xcode-select -s "$SELECTED"
          echo "DEVELOPER_DIR=$SELECTED" >> $GITHUB_ENV
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Detect Xcode
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          xcodebuild -version || true
          xcrun --sdk iphoneos --show-sdk-version || true

      - name: Verify Build Readiness
        run: node scripts/verify-build-readiness.js

      - name: Build IPA (Production Local)
        run: |
          set -o pipefail
          npx eas build --platform ios --profile production_local --local --non-interactive --output="./build-ios/Acucaradas.ipa" | xcbeautify
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NODE_ENV: production
          NO_SENTRY_VALIDATE: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acucaradas-iOS-IPA
          path: build-ios/Acucaradas.ipa
          if-no-files-found: error
          retention-days: 7
