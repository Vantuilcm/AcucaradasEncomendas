<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Build Dashboard - RellBuild Pipeline</title>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --warning: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1C1C1E; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { color: #8E8E93; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #F2F2F7; text-align: left; padding: 15px; font-size: 12px; text-transform: uppercase; color: #8E8E93; }
        td { padding: 15px; border-top: 1px solid #F2F2F7; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-success { background: #E2F9E9; color: var(--success); }
        .badge-error { background: #FFEBEA; color: var(--error); }
        .badge-warning { background: #FFF4E5; color: var(--warning); }
        .commit { font-family: monospace; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍎 iOS Build Dashboard</h1>
            <div id="last-updated" class="stat-label">Carregando...</div>
        </div>

        <div class="stats">
            <div class="card">
                <div id="total-builds" class="stat-value">0</div>
                <div class="stat-label">Total de Builds</div>
            </div>
            <div class="card">
                <div id="success-rate" class="stat-value">0%</div>
                <div class="stat-label">Taxa de Sucesso</div>
            </div>
            <div class="card">
                <div id="latest-version" class="stat-value">-</div>
                <div class="stat-label">Última Versão</div>
            </div>
        </div>

        <div class="card" style="padding: 0;">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Versão (Build)</th>
                        <th>Commit</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr><td colspan="4" style="text-align: center;">Buscando histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                // No ambiente real do GitHub Pages ou similar, apontaríamos para o JSON
                const response = await fetch('../build-logs/build-history.json');
                const history = await response.json();
                
                const total = history.length;
                const success = history.filter(b => b.status === 'SUCCESS').length;
                const rate = total > 0 ? Math.round((success / total) * 100) : 0;
                
                document.getElementById('total-builds').innerText = total;
                document.getElementById('success-rate').innerText = rate + '%';
                document.getElementById('latest-version').innerText = history[0]?.version || '-';
                document.getElementById('last-updated').innerText = 'Última atualização: ' + new Date().toLocaleString();

                const tbody = document.getElementById('history-body');
                tbody.innerHTML = history.map(build => `
                    <tr>
                        <td>${new Date(build.timestamp).toLocaleString()}</td>
                        <td>${build.version} (${build.buildNumber})</td>
                        <td class="commit">${build.commit.substring(0, 7)}</td>
                        <td><span class="badge badge-${build.status.toLowerCase() === 'success' ? 'success' : 'error'}">${build.status}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Erro ao carregar histórico:', e);
            }
        }
        loadHistory();
    </script>
</body>
</html>
