name: RellBuild - Automatic Key Rotation

on:
  schedule:
    - cron: '0 0 1 */2 *' # Executa a cada 60 dias (no primeiro dia de cada segundo mês)
  workflow_dispatch: # Permite execução manual para testes

jobs:
  rotate:
    name: Rotate Service Account Keys
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROJECT_ID: "acucaradas-encomendas" # ID do seu projeto no Google Cloud

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }} # Usamos a chave existente para criar a nova

      - name: ⚙️ Setup GCloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🔄 Rotate Play Store Service Account Key
        run: |
          chmod +x scripts/rotate-keys.sh
          # Rotacionar a conta play-deploy-bot e atualizar o secret correspondente
          ./scripts/rotate-keys.sh "play-deploy-bot@${PROJECT_ID}.iam.gserviceaccount.com" "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" "${PROJECT_ID}"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "### 🛡️ RellBuild Security Report: Key Rotation" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Policy:** Rotação a cada 60 dias (Menor Privilégio)" >> $GITHUB_STEP_SUMMARY
          echo "- **Impacto:** Zero Downtime (Nova chave ativa no GitHub Secrets)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- **Resultado:** Chaves de Service Account rotacionadas e sincronizadas com sucesso." >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Erro:** Falha na rotação. Favor verificar logs e chaves manuais." >> $GITHUB_STEP_SUMMARY
          fi
