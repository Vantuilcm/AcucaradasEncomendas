# Workflow for GitHub-hosted iOS builds (Ultra Safe Cleaned)
name: iOS Production Build (GitHub Free)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
      - upgrade/sdk-52-rn-076
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile'
        required: true
        default: 'production_local'
        type: choice
        options:
          - production_local
          - preview
          - development
      mode:
        description: 'Modo de execucao'
        required: true
        default: 'github_macos'
        type: choice
        options:
          - audit_only
          - github_macos
      publish_update:
        description: 'Publicar EAS Update (OTA)'
        required: true
        default: false
        type: boolean
  repository_dispatch:
    types:
      - ios_build_free

env:
  # Using safe access to inputs
  INPUT_PROFILE: ${{ github.event.inputs.profile || github.event.client_payload.profile || 'production_local' }}
  INPUT_MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'github_macos' }}
  INPUT_PUBLISH_UPDATE: ${{ github.event.inputs.publish_update || github.event.client_payload.publish_update || false }}

jobs:
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: 1
      SENTRY_ALLOW_FAILURE: 1
      EXPO_PUBLIC_ENABLE_SENTRY: 0
      NO_SENTRY_VALIDATE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate profile
        run: |
          if [ "${INPUT_PROFILE}" != "production_local" ]; then
            echo "Erro: Este workflow so permite production_local."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
        env:
          # Fix indentation for env variables
          NODE_ENV: development
          NO_SENTRY_VALIDATE: 1

      - name: Run Validations
        continue-on-error: true
        run: |
          echo "🔍 Executando Lint..."
          npm run lint || echo "⚠️ Lint falhou, mas continuando build..."
          echo "🔍 Executando Type Check..."
          npm run type-check || echo "⚠️ Type Check falhou, mas continuando build..."
          echo "🔍 Executando Pre-build Check..."
          npm run pre-build-check

      - name: Prepare environment
        run: npm run prepare:ios
        env:
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}

  build:
    name: Build iOS IPA
    runs-on: macos-14
    needs: preflight
    if: ${{ (github.event.inputs.mode || github.event.client_payload.mode || 'github_macos') == 'github_macos' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
        env:
          NODE_ENV: development

      - name: Prepare iOS Build
        run: npm run prepare:ios
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          APPLE_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          APPLE_PROVISION_BASE64: ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          ONESIGNAL_CERT_BASE64: ${{ secrets.ONESIGNAL_CERT_BASE64 }}
          ONESIGNAL_PROVISION_BASE64: ${{ secrets.ONESIGNAL_PROVISION_BASE64 }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install xcbeautify
        run: brew install xcbeautify || true

      - name: Install CocoaPods
        run: |
          echo "📦 Configurando Homebrew..."
          eval "$(/opt/homebrew/bin/brew shellenv)"
          
          echo "📦 Instalando CocoaPods via Homebrew..."
          brew install cocoapods
          
          echo "🔧 Configurando PATH para CocoaPods..."
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          
          echo "Verificando instalação..."
          which pod
          pod --version

      - name: Build IPA
        run: |
          # Carregar ambiente do Homebrew para garantir acesso ao pod
          eval "$(/opt/homebrew/bin/brew shellenv)"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          
          echo "🔍 Verificando ambiente antes do build..."
          echo "PATH: $PATH"
          which pod || echo "❌ pod não encontrado no which"
          pod --version || echo "❌ pod --version falhou"
          
          set -o pipefail
          echo "🚀 Iniciando Build IPA"
          echo "📌 Commit Hash: $(git rev-parse --short HEAD)"
          
          echo "🔐 Verificando presença de segredos..."
          if [ -n "${{ secrets.IOS_DIST_CERT_BASE64 }}" ]; then echo "✅ IOS_DIST_CERT_BASE64 está configurado"; else echo "❌ IOS_DIST_CERT_BASE64 está VAZIO"; fi
          if [ -n "${{ secrets.IOS_CERT_PASSWORD }}" ]; then echo "✅ IOS_CERT_PASSWORD está configurado"; else echo "❌ IOS_CERT_PASSWORD está VAZIO"; fi

          echo "📂 Listando diretório credentials/ios/:"
          ls -R credentials/ios/ || echo "⚠️ Diretório credentials/ios/ não encontrado!"

          # Validar se o P12 gerado é legível (sem mostrar a senha)
          if [ -f "credentials/ios/AcucaradasEncomendas-dist-cert.p12" ]; then
            echo "🔍 Verificando integridade do certificado P12..."
            FILE_SIZE=$(wc -c < "credentials/ios/AcucaradasEncomendas-dist-cert.p12")
            echo "📊 Tamanho do arquivo P12: $FILE_SIZE bytes"

            if openssl pkcs12 -info -in credentials/ios/AcucaradasEncomendas-dist-cert.p12 -passin pass:"${APPLE_CERT_PASSWORD}" -nokeys -nodes > /dev/null 2>&1; then
              echo "✅ Certificado P12 e senha validados com sucesso."
            else
              echo "------------------------------------------------------"
              echo "❌ ERRO CRÍTICO: SENHA DO CERTIFICADO INVÁLIDA"
              echo "A senha configurada no segredo 'IOS_CERT_PASSWORD' não funciona para este certificado P12."
              echo "DICA: Verifique se o Base64 foi gerado corretamente e se a senha não contém aspas ou espaços."
              echo "------------------------------------------------------"
              exit 1
            fi
          else
            echo "❌ ERRO: Arquivo P12 não encontrado em credentials/ios/AcucaradasEncomendas-dist-cert.p12"
            exit 1
          fi
          
          eas build --platform ios --profile production_local --local --non-interactive --output="./Acucaradas.ipa"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          NO_SENTRY_VALIDATE: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acucaradas-IPA
          path: ./Acucaradas.ipa
          if-no-files-found: error
          retention-days: 7

# Force rebuild for syntax fix verification
