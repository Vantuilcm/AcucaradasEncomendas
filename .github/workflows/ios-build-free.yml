# Workflow for GitHub-hosted iOS builds (Ultra Safe Cleaned)
name: iOS Production Build (GitHub Free)

concurrency:
  group: ios-build-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
      - upgrade/sdk-52-rn-076
      - fix-build-sdk-52
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build'
        required: false
        default: 'fix-build-sdk-52'
        type: string
      mode:
        description: 'Modo de execucao'
        required: true
        default: 'github_macos'
        type: choice
        options:
          - audit_only
          - github_macos
      publish_update:
        description: 'Publicar EAS Update (OTA)'
        required: true
        default: false
        type: boolean
  repository_dispatch:
    types:
      - ios_build_free

env:
  # Using safe access to inputs
  INPUT_REF: ${{ inputs.ref || github.event.client_payload.ref || github.ref_name }}
  INPUT_MODE: ${{ inputs.mode || github.event.client_payload.mode || 'github_macos' }}
  INPUT_PUBLISH_UPDATE: ${{ inputs.publish_update || github.event.client_payload.publish_update || false }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    env:
      SENTRY_DISABLE_AUTO_UPLOAD: 1
      SENTRY_ALLOW_FAILURE: 1
      EXPO_PUBLIC_ENABLE_SENTRY: 0
      NO_SENTRY_VALIDATE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
          npm install expo-apple-authentication
          npx patch-package
        env:
          NODE_ENV: development
          NO_SENTRY_VALIDATE: 1

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          expo-cache: false
          eas-cache: false

  build:
    name: Build iOS IPA
    runs-on: macos-15
    needs: preflight
    if: ${{ (inputs.mode || github.event.client_payload.mode || 'github_macos') == 'github_macos' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INPUT_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --fund=false
          npm install expo-apple-authentication
          npx patch-package
        env:
          NODE_ENV: development
          NO_SENTRY_VALIDATE: 1

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APP_STORE_CONNECT_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}



      - name: Generate .env file
        run: |
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=acucaradas-encomendas.firebaseapp.com" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=acucaradas-encomendas" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=acucaradas-encomendas.firebasestorage.app" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=627855691834" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=1:627855691834:ios:802f87fc389cae45af6503" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=G-L9E5XQZ8Z7" >> .env
          echo "EXPO_PUBLIC_FIREBASE_VAPID_KEY=BGsK_P7k_J6R7z_9X_X_X_X_X_X_X_X_X_X_X_X_X_X" >> .env
          echo "EXPO_PUBLIC_FACEBOOK_APP_ID=1141386540846067" >> .env
          echo "EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS=627855691834-stv1r6evltm67q62isqqodgkv4ie023a.apps.googleusercontent.com" >> .env
          echo "EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB=627855691834-d3jm1hc7o3p6l6j26mc8u3ouhve27iqv.apps.googleusercontent.com" >> .env
          echo "EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=627855691834-cg7iut6b6ebf7tl3eu09icmpbq14h489.apps.googleusercontent.com" >> .env
          echo "EXPO_PUBLIC_GOOGLE_EXPO_CLIENT_ID=627855691834-5oflaa1nve907gro3ntehub8g8smg83l.apps.googleusercontent.com" >> .env
          echo "EXPO_PUBLIC_API_URL=https://api.acucaradasencomendas.com.br" >> .env
          echo "EXPO_PUBLIC_APP_ENV=production" >> .env
          echo "EXPO_PUBLIC_APP_NAME=Açucaradas Encomendas" >> .env
          echo "EXPO_PUBLIC_PROJECT_ID=6090106b-e327-4744-bce5-9ddb0d037045" >> .env
          echo "EXPO_PUBLIC_APP_VERSION=1.0.1" >> .env
          echo "EXPO_PUBLIC_ENABLE_SENTRY=false" >> .env
          echo "EXPO_PUBLIC_ENABLE_ONESIGNAL=true" >> .env
          echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=2df9c7f0-6fb7-4cbe-87e9-c6fb116203f7" >> .env
          echo "EXPO_PUBLIC_APPLE_MERCHANT_ID=merchant.com.acucaradas.encomendas" >> .env
          echo "EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" >> .env
          echo "EXPO_PUBLIC_ENABLE_DEVICE_SECURITY_CHECKS=true" >> .env

      - name: Build IPA
        run: |
          set -o pipefail
          
          eas build --platform ios --profile production --non-interactive --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APP_STORE_CONNECT_API_KEY: ${{ secrets.EXPO_APP_STORE_CONNECT_API_KEY }}
          NODE_ENV: production
          NO_SENTRY_VALIDATE: 1
          # Firebase Configuration (Restored original correct values)
          EXPO_PUBLIC_FIREBASE_API_KEY: "${{ secrets.FIREBASE_API_KEY }}"
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "acucaradas-encomendas.firebaseapp.com"
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: "acucaradas-encomendas"
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "acucaradas-encomendas.firebasestorage.app"
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "627855691834"
          EXPO_PUBLIC_FIREBASE_APP_ID: "1:627855691834:ios:802f87fc389cae45af6503"
