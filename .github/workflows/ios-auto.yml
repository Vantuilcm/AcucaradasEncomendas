name: IOS AUTO BUILD

on:
  push:
    branches:
      - release-stable-1168

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 Diagnose macOS/Xcode
        run: |
          echo "=== System Info ==="
          sw_vers
          echo "=== Available Xcode Versions ==="
          ls /Applications | grep Xcode || true
          echo "=== Current Xcode Selection ==="
          xcode-select -p
          echo "=== Current Xcode Version ==="
          xcodebuild -version
          echo "=== Available SDKs ==="
          xcodebuild -showsdks

      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: 🔍 Verify Selected Xcode
        run: |
          echo "=== Final Xcode Selection ==="
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Show Xcode
        run: xcodebuild -version