# RellBuild: PIPELINE CLOUD BLINDADO (EAS Cloud Native)
# Data: 2026-03-30
# Engenheiro Responsável: RellBuild Sênior

name: 🚀 Build & Submit Mobile (EAS Cloud)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ RellBuild Pipeline
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Firebase Secrets (Usando os nomes exatos do seu GitHub)
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      # Variáveis de Ambiente Públicas (Injetadas no Build)
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      APP_ENV: "production"

    steps:
      # 🔹 1. Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 🔹 2. Setup Node
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 🔹 3. Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      # 🔹 4. Install EAS CLI
      - name: ⚙️ Install EAS CLI
        run: npm install -g eas-cli@15.0.10

      # 🔹 5. Validation & Firebase Injection (FAIL FAST)
      - name: 🛡️ Validate & Inject Critical Files
        run: |
          echo "🔍 Validando ambiente e injetando arquivos críticos..."
          
          # Validar EXPO_TOKEN
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ ERRO: EXPO_TOKEN não configurado no GitHub Secrets!"
            exit 1
          fi

          # Injetar google-services.json (Android)
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "🤖 Injetando google-services.json..."
            if [[ "$GOOGLE_SERVICES_JSON" == *"{"* ]]; then
              echo "$GOOGLE_SERVICES_JSON" > google-services.json
            else
              echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
            fi
          fi

          # Injetar GoogleService-Info.plist (iOS)
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "🍏 Injetando GoogleService-Info.plist..."
            if [[ "$GOOGLE_SERVICE_INFO_PLIST" == *"<"* ]]; then
              echo "$GOOGLE_SERVICE_INFO_PLIST" > GoogleService-Info.plist
            else
              echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > GoogleService-Info.plist
            fi
          fi

          echo "✅ Validação e Injeção concluídas com sucesso."

      # 🔹 6. Expo Doctor (Check configs)
      - name: 🩺 Expo Doctor
        run: npx expo-doctor

      # 🔹 7. Build Android (Cloud)
      - name: 🤖 Build Android (EAS Cloud)
        if: "!contains(github.event.head_commit.message, '[skip-android]') && !contains(github.event.head_commit.message, '[ios-only]')"
        run: |
          echo "🚀 Iniciando build Android no EAS Cloud..."
          eas build --platform android --profile production_v13 --non-interactive

      # 🔹 8. Build iOS (Cloud)
      - name: 🍏 Build iOS (EAS Cloud)
        if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        run: |
          echo "🚀 Iniciando build iOS no EAS Cloud..."
          eas build --platform ios --profile production_v13 --non-interactive

      # 🔹 9. Submit iOS to TestFlight
      - name: 📤 Submit iOS (TestFlight)
        if: success() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')
        run: |
          echo "📤 Enviando build iOS mais recente para TestFlight..."
          eas submit --platform ios --latest --non-interactive

      # 🔹 10. Status Final
      - name: ✅ Pipeline Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🔥 Pipeline finalizado com sucesso absoluto!"
          else
            echo "❌ Pipeline falhou. Verifique as etapas acima."
            exit 1
          fi
