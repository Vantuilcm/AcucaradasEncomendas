# RellBuild: PIPELINE CLOUD BLINDADO (EAS Cloud Native)
# Data: 2026-03-30
# Engenheiro Responsável: RellBuild Sênior

name: 🚀 Build & Submit Mobile (EAS Cloud)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ RellBuild Pipeline
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Apple Store Connect API Key (Obrigatório para modo não-interativo)
      EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
      EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      EXPO_APPLE_TEAM_TYPE: "COMPANY_OR_ORGANIZATION"
      EXPO_ASC_PRIVATE_KEY: ${{ secrets.EXPO_ASC_PRIVATE_KEY }}
      EXPO_ASC_PRIVATE_KEY_BASE64: ${{ secrets.EXPO_ASC_PRIVATE_KEY_BASE64 }}
      # Firebase Secrets (Usando os nomes exatos do seu GitHub)
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      # Variáveis de Ambiente Públicas (Injetadas no Build)
      EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      APP_ENV: "production"

    steps:
      # 🔹 1. Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 🔹 2. Setup Node
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 🔹 3. Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      # 🔹 4. Install EAS CLI
      - name: ⚙️ Setup EAS CLI
        run: npm install -g eas-cli@latest

      # 🔹 5. Validation & Firebase Injection (FAIL FAST)
      - name: 🛡️ Validate & Inject Critical Files
        run: |
          echo "🔍 Validando ambiente e injetando arquivos críticos..."
          
          # Validar EXPO_TOKEN
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ ERRO: EXPO_TOKEN não configurado no GitHub Secrets!"
            exit 1
          fi

          # Injetar google-services.json (Android)
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "🤖 Injetando google-services.json..."
            if [[ "$GOOGLE_SERVICES_JSON" == *"{"* ]]; then
              echo "$GOOGLE_SERVICES_JSON" > google-services.json
            else
              echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
            fi
          fi

          # Injetar GoogleService-Info.plist (iOS)
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "🍏 Injetando GoogleService-Info.plist..."
            if [[ "$GOOGLE_SERVICE_INFO_PLIST" == *"<"* ]]; then
              echo "$GOOGLE_SERVICE_INFO_PLIST" > GoogleService-Info.plist
            else
              echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > GoogleService-Info.plist
            fi
          fi

          # Injetar ASC API Key (.p8) com suporte a Multiline e Base64
          if [ -n "$EXPO_ASC_PRIVATE_KEY_BASE64" ]; then
            echo "🔑 Decodificando ASC Private Key via Base64..."
            echo "$EXPO_ASC_PRIVATE_KEY_BASE64" | base64 --decode > AuthKey.p8
          elif [ -n "$EXPO_ASC_PRIVATE_KEY" ]; then
            echo "🔑 Normalizando ASC Private Key (multiline safe)..."
            echo "$EXPO_ASC_PRIVATE_KEY" | sed 's/\\n/\n/g' > AuthKey.p8
          else
            echo "❌ ERRO CRÍTICO: EXPO_ASC_PRIVATE_KEY não encontrada!"
            exit 1
          fi

          # Exportar para o ambiente do GitHub Actions preservando multiline
          echo "EXPO_ASC_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat AuthKey.p8 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Forçar caminho da chave para evitar prompts no EAS CLI
          echo "EXPO_ASC_API_KEY_PATH=./AuthKey.p8" >> $GITHUB_ENV
          
          echo "✅ Chave AuthKey.p8 preparada e exportada."

          # 🍎 Validação de Consistência da Apple API Key
          echo "🍎 Validando consistência das credenciais Apple (ADMIN)..."
          if [ -z "$EXPO_ASC_KEY_ID" ] || [ -z "$EXPO_ASC_ISSUER_ID" ]; then
            echo "❌ ERRO: EXPO_ASC_KEY_ID ou EXPO_ASC_ISSUER_ID faltando!"
            exit 1
          fi
          
          echo "🔑 Key ID em uso: $EXPO_ASC_KEY_ID"
          
          # 🛡️ Hardening: Remover qualquer credencial manual (Base64/P12/Provisioning)
          # Isso força o EAS a usar apenas Remote Credentials + ASC API Key (Admin)
          unset IOS_DIST_CERT_BASE64 IOS_PROV_PROFILE_BASE64 IOS_CERT_PASSWORD
          unset EXPO_APPLE_ID EXPO_APPLE_PASSWORD EXPO_APPLE_APP_SPECIFIC_PASSWORD
          echo "🛡️ Credenciais manuais e Apple ID bloqueados. Forçando EAS Remote Credentials + ASC API Key (Admin)."

          # 🧹 Limpeza Profunda de Credenciais EAS (Opcional, se houver falha de certificado persistente)
          # echo "🧹 Limpando credenciais EAS locais no CI..."
          # eas credentials:clear --platform ios --non-interactive || true

          echo "✅ Validação e Injeção concluídas com sucesso."

      # 🔹 6. Expo Doctor (Check configs)
      - name: 🩺 Expo Doctor
        run: npx expo-doctor

      # 🔹 7. Build Android (Cloud) - DESATIVADO (Já concluído)
      - name: 🤖 Build Android (EAS Cloud)
        if: false # Desativado conforme solicitação: Build Android já está pronto.
        run: |
          echo "🚀 Build Android ignorado (Já concluído)."

      # 🔹 8. Build iOS (Cloud)
      - name: 🍏 Build iOS (EAS Cloud)
        if: "!contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: "./AuthKey.p8"
        run: |
          echo "🚀 Iniciando Build iOS no EAS Cloud..."
          
          # 1. Limpeza de Cache e Forçar Novas Credenciais
          # A flag '--clear-cache' força o EAS a revalidar o ambiente.
          
          echo "🏗️ Executando build iOS (Profile: production_v13)..."
          EXPO_DEBUG=1 eas build --platform ios --profile production_v13 --non-interactive --clear-cache

      # 🔹 9. Submit iOS to TestFlight
      - name: 📤 Submit iOS (TestFlight)
        if: success() && !contains(github.event.head_commit.message, '[skip-ios]') && !contains(github.event.head_commit.message, '[android-only]')
        run: |
          echo "📤 Enviando build iOS mais recente para TestFlight..."
          eas submit --platform ios --latest --non-interactive

      # 🔹 10. Status Final
      - name: ✅ Pipeline Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🔥 Pipeline finalizado com sucesso absoluto!"
          else
            echo "❌ Pipeline falhou. Verifique as etapas acima."
            exit 1
          fi
