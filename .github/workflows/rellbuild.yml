name: RellBuild Beta Pipeline

on:
  push:
    branches:
      - main
      - master
      - upgrade/sdk-52-rn-076
  workflow_dispatch:

jobs:
  validate-and-build:
    name: RellBuild Validation & Build
    runs-on: macos-latest
    env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        ACTIONS_STEP_DEBUG: true # Enable debug logging to find the exact failure
        CI: 1 # Ensure non-interactive mode for all commands

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Use Node 24 to avoid deprecation warnings
          # Cache removed temporarily to avoid GitHub Cache Service 503/400 errors
          # cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🛡️ RellBuild Prebuild Validation
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED || 'true' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_PROJECT_ID: "6090106b-e327-4744-bce5-9ddb0d037045"
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
        run: |
          echo "🔍 Verificando presença de secrets..."
          
          # Injeção direta no step para maior confiabilidade
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf "%s" "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "✅ google-services.json injetado via raw JSON"
          elif [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > google-services.json
            echo "✅ google-services.json injetado via base64"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON não encontrado. Criando placeholder para evitar falha no prebuild..."
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"0","android_client_info":{"package_name":"com.acucaradas.encomendas"}},"api_key":[{"current_key":"placeholder"}]}]}' > google-services.json
          fi

          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf "%s" "$GOOGLE_SERVICE_INFO_PLIST" > GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist injetado via raw content"
          elif [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist injetado via base64"
          else
            echo "⚠️ GOOGLE_SERVICE_INFO_PLIST não encontrado. Criando placeholder..."
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CLIENT_ID</key><string>placeholder</string></dict></plist>' > GoogleService-Info.plist
          fi
          
          # Garantir que scripts têm permissão de execução
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/*.js 2>/dev/null || true
          
          ./scripts/rellbuild-prebuild.sh
          
          echo "🔍 Verificação final de arquivos:"
          ls -la google-services.json GoogleService-Info.plist

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🩺 Expo Doctor Check
        run: npx expo-doctor || echo "Expo Doctor found issues but continuing..."

      - name: ⚙️ Expo Prebuild (Optional/Sanity)
        run: npx expo prebuild --clean

      - name: 🤖 Build Android Beta (APK)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED || 'true' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
        run: |
          # Build APK para testes internos
          eas build --platform android --profile beta --local --non-interactive --output app-beta.apk

      - name: 🤖 Build Android Release (AAB)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED || 'true' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
        run: |
          # Build AAB para Play Store
          eas build --platform android --profile production --local --non-interactive --output app-release.aab

      - name: 🍎 Build iOS Release (IPA)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_ENABLED: ${{ secrets.EXPO_PUBLIC_SENTRY_ENABLED || 'true' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Build IPA para App Store/TestFlight
          eas build --platform ios --profile production --local --non-interactive --output app-release.ipa

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rellbuild-artifacts
          path: |
            app-beta.apk
            app-release.aab
            app-release.ipa
          if-no-files-found: warn

      - name: 📊 RellBuild Final Report
        if: always()
        run: |
          echo "### RellBuild Status"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build concluído com sucesso!"
          else
            echo "❌ Build falhou. Verifique os logs acima."
          fi
